<style>
  :root { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
  body { margin: 0; color: #0f172a; background: #0b1220; }
  ::-webkit-scrollbar { width: 0; }

  /* fixed full-screen physics graphic, behind the scrolling text */
  #graphic { position: fixed; inset: 0; z-index: 0;
             background: radial-gradient(120% 100% at 70% 10%, #16233b 0%, #0b1220 60%); }
  #graphic svg { width: 100%; height: 100%; display: block;
                 will-change: transform; }              /* device-tilt parallax composites on this layer */
  .fx circle { pointer-events: none; }                  /* connection ripples — purely decorative */

  /* ring guides, pairing links, team circles — strokes & label sizes scale with --sw (node radius / 14) */
  #graphic svg { --sw: 1; }
  .guide { display: none; }   /* positions only — the schedule circles are never drawn */
  .divider { stroke: #33456b; stroke-width: calc(2px * var(--sw)); stroke-dasharray: 3 9; stroke-linecap: round; }
  .pair  { stroke: #34d399; stroke-width: calc(5px * var(--sw)); stroke-linecap: round; }
  .pair.want { stroke: #64748b; stroke-width: calc(1.8px * var(--sw)); stroke-dasharray: 3 9; stroke-linecap: butt; }
  .hit   { stroke: transparent; stroke-width: 18; }
  .team circle { stroke-width: calc(2.5px * var(--sw)); transition: fill .55s ease, stroke .55s ease; filter: url(#soft); }
  .team .idle, .team circle.idle { fill: #64748b; stroke: #94a3b8; }
  .team circle.play { fill: #22c55e; stroke: #86efac; }
  .team circle.wait { fill: #f97316; stroke: #fdba74; }
  .team circle.absent { fill: #273450; stroke: #44536f; }     /* cancelled: dark, label becomes ✕ */
  .team circle.isolated { fill: #7f1d1d; stroke: #f87171;     /* both scheduled opponents cancelled */
                          animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { stroke-opacity: 1; } 50% { stroke-opacity: 0.2; } }
  @keyframes shake { 0%, 100% { transform: translateX(0); }      /* brief "look here" wiggle */
    15%, 45%, 75% { transform: translateX(calc(-6px * var(--sw))); }
    30%, 60%, 90% { transform: translateX(calc( 6px * var(--sw))); } }
  .team circle      { fill: #64748b; stroke: #94a3b8; }
  .team text { fill: #fff; font-weight: 700; text-anchor: middle;
               dominant-baseline: central; pointer-events: none; }
  .team text.nname { fill: #94a3b8; font-weight: 600; font-size: calc(11px * var(--sw));

  @media (max-width: 620px), (max-height: 560px) {   /* lighter, less chunky text on phones */

  .divbox-g { animation: fadein .6s ease both; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

  /* scrolling narrative — graphic z0, cards z1 (above graphic), chrome z3+ (above cards) */
  main { position: relative; z-index: 1; pointer-events: none; }   /* clicks fall through to the graphic; .card re-enables */
  .step { height: 100vh; height: 100dvh; scroll-snap-align: center; position: relative; pointer-events: none; }
  .card {

    box-shadow: 0 24px 60px -22px rgba(0,0,0,0.6);

  .step.exiting .card { opacity: 0; transform: translateY(-12px); }  /* fade out, drifting slightly up */
  .kicker { font-size: 12px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase;

  .stat { margin-top: 9px; display: flex; align-items: center; gap: 8px;
          padding-top: 9px; border-top: 1px solid #eef2f7; }
  .stat .num  { font-size: 29px; font-weight: 800; line-height: 1; white-space: nowrap; flex: none; }

  .tryit { margin-top: 10px; font-size: 12.5px; font-weight: 700; color: #2563eb;
           display: inline-flex; align-items: center; gap: 6px; }
  /* the roster overlay: name chips that regroup (FLIP) across the schedule-building scenes.
     Lists run vertically, filling the stage height; the flat roster gains columns as width allows. */
  #namegrid { position: fixed; z-index: 0; display: none; pointer-events: none; gap: 34px; overflow: hidden;
              justify-content: center; align-items: center; transition: opacity .35s ease; }
  #namegrid .ncol { flex: 0 0 auto; min-width: 0; display: flex; flex-direction: column; gap: 20px; }
  #namegrid .nblock { min-width: 0; }

  #namegrid .ngrid { display: flex; flex-direction: column; gap: 6px; }
  #namegrid.gapped .chip.cut { margin-top: 30px; }   /* space opens at the division boundaries first */
  /* pools: compact variant so the tallest column (4 + 7 + two headers) always fits vertically */
  #namegrid.pools { gap: 36px; }
  #namegrid.pools .ncol { gap: 10px; }
  #namegrid.pools .ngrid { gap: 4px; }
  #namegrid.pools b { font-size: 10.5px; letter-spacing: .04em; margin: 0 0 5px 2px; line-height: 1.3; }
  #namegrid.pools .chip { font-size: 12px; gap: 6px; }
  #namegrid.pools .chip i { width: 22px; height: 22px; font-size: 8.5px; }
  #namegrid b { display: block; color: #cbd5e1; font-size: 12px; font-weight: 700;
                letter-spacing: .05em; text-transform: uppercase; margin: 0 0 8px 2px; }
  /* chip = the same team-circle iconography as the ring scenes (idle colours), name aligned after */
  #namegrid .chip { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600;
                    color: #e2e8f0; width: 13.5em; will-change: transform; }

                      background: #64748b; border: 2px solid #94a3b8; color: #fff; font-weight: 700;

  @media (max-width: 620px) {                        /* phone: shrinkable columns (scale-to-fit handles height) */

  /* iOS-only opt-in to motion access (shown by script when the permission API exists) */

  .brand { position: fixed; top: 20px; left: 5vw; z-index: 3; color: #e2e8f0;

  .brand span { color: #60a5fa; }
  #hud { position: fixed; top: 56px; right: 22px; z-index: 3; display: none; pointer-events: none;

  #hud b { color: #fff; }
  #hud small { display: block; margin-top: 4px; color: #94a3b8; font-size: 11px; font-weight: 600; }
  #hud small i { font-style: normal; }
  #hud small i.g { color: #34d399; } #hud small i.w { color: #94a3b8; letter-spacing: 1px; }
  /* interactive scenes: a quiet pill by the graphic — circles & links respond to taps */
  #tapnote { position: fixed; top: 56px; right: 22px; z-index: 3; display: none; pointer-events: none;
             background: rgba(15,23,42,0.72); border: 1px solid rgba(148,163,184,0.25); border-radius: 12px;
             color: #cbd5e1; font-size: 12px; font-weight: 600; padding: 7px 12px; }
  #tapnote i { font-style: normal; color: #60a5fa; }
  #progress { position: fixed; top: 0; left: 0; height: 3px; width: 0;
              background: linear-gradient(90deg,#3b82f6,#22c55e); z-index: 4; transition: width .15s; }
  .dots { position: fixed; right: 22px; top: 50%; transform: translateY(-50%);
          z-index: 3; display: flex; flex-direction: column; gap: 12px; }
  .dots button { width: 11px; height: 11px; border-radius: 50%; border: 0; padding: 0; cursor: pointer;

  .dots button.on { background: #e2e8f0; transform: scale(1.45); }

  @media (max-width: 620px) {                          /* portrait phone: compact card centred at the bottom */
    .card { left: 50%; margin-left: -46vw; width: 92vw; bottom: 3vh; bottom: 3svh; padding: 13px 16px; }
    .kicker { font-size: 10px; margin-bottom: 4px; }
    .card h2 { font-size: 16px; margin-bottom: 5px; line-height: 1.15; }
    .card p  { font-size: 12.5px; line-height: 1.45; }
    .stat { margin-top: 7px; padding-top: 7px; }

    .stat .unit { font-size: 11px; line-height: 1.3; }

  @media (max-height: 560px) {                         /* short / landscape phone: card as a left-hand panel */

            max-height: 88vh; overflow: auto; padding: 16px 18px; }
    .card h2 { font-size: 18px; margin-bottom: 6px; } .card p { font-size: 13.5px; line-height: 1.45; }
    .card .stat { margin-top: 10px; padding-top: 9px; } .card .stat .num { font-size: 30px; }

  /* ── PWA full-bleed: keep chrome clear of the Dynamic Island & home indicator ── */
  @supports (top: env(safe-area-inset-top)) {
    .brand         { top: calc(20px + env(safe-area-inset-top)); left: max(5vw, env(safe-area-inset-left)); }
    #hud, #tapnote { top: calc(56px + env(safe-area-inset-top)); right: calc(22px + env(safe-area-inset-right)); }
    .dots          { right: calc(22px + env(safe-area-inset-right)); }
    .card          { bottom: calc(9vh + env(safe-area-inset-bottom)); left: max(5vw, env(safe-area-inset-left)); }
    @media (max-width: 620px) {                        /* portrait phone keeps its centred card */
      .card        { left: 50%; bottom: calc(3svh + env(safe-area-inset-bottom)); }
    }
    @media (max-height: 560px) {                       /* landscape phone keeps its left panel */
      .card        { left: max(2.5vw, env(safe-area-inset-left)); top: calc(6vh + env(safe-area-inset-top)); bottom: auto; }
    }
  }
</style>

<body>

<div id="progress"></div>
<div class="brand">Delaware Doubles · <span>scheduling</span></div>
<div id="hud"></div>
<div id="tapnote"><i>✦</i> tap a circle or a game to change pairings</div>
<button id="tiltbtn"><i>↕</i> Enable tilt</button>
<div id="graphic">
  <svg>
    <defs>
      <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.45"/>
      </filter>
    </defs>
    <g class="cam">
      <line class="divider" opacity="0"></line>
      <g class="boxes"></g>
      <g class="guides"></g>
      <g class="links"></g>
      <g class="nodes"></g>
      <g class="caps"></g>
      <g class="fx"></g>
    </g>
  </svg>
</div>
<div id="namegrid"></div>

<main></main>
<div class="dots"></div>

<script>
/* ───────────────── helpers from the ring visualization ───────────────── */
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const splitGroups = (total, target) => {            // matches ring.js / observable.md: 11,4 → [4,7] (every ring ≥ 4)
  const g = Math.max(1, Math.floor(total / target));
  return Array.from({ length: g }, (_, i) => i < g - 1 ? target : total - target * (g - 1));
};
const evenGroups = (total, divisions) => {          // 27,3 → [8,8,11]
  const D = Math.max(1, Math.min(divisions, Math.floor(total / 4)));
  let base = Math.max(4, 4 * Math.round(total / D / 4));
  while (D > 1 && total - base * (D - 1) < 4) base -= 4;
  return Array.from({ length: D }, (_, i) => i < D - 1 ? base : total - base * (D - 1));
};
// a maximum matching of a ring of m (pairs neighbours, leaves the last one out if odd)
const best = m => { const pairs = []; for (let s = 0; s + 1 < m; s += 2) pairs.push([s, s + 1]);
  return { pairs, wait: m % 2 ? [m - 1] : [] }; };
// worst stable stall for the 9-ring: games (0-1)(3-4)(6-7) strand 2,5,8 — the bad night
const matchingFor = (kind, m) =>
  (kind === 'worst' && m === 9) ? { pairs: [[0,1],[3,4],[6,7]], wait: [2,5,8] } : best(m);
const sliceMembers = (ids, sizes) => { let i = 0; return sizes.map(s => ids.slice(i, i += s)); };

// greedy free-for-all on one ring (mirrors analysis_absences.py): the present slots arrive in
// random order, each pairing on arrival with an idle present neighbour if one exists — the
// league's actual play-whoever's-free regime. Returns an animatable step list
// ({arrive:j} | {edge:k}, k = the ring-edge bit) plus the night's stranded count.
function greedyRing(m, absent) {
  const order = d3.shuffle(d3.range(m).filter(j => !absent.has(j)));
  const matched = new Set(), arrived = new Set(), steps = [];
  order.forEach(j => {
    arrived.add(j); steps.push({ arrive: j });
    const nb = [(j+m-1)%m, (j+1)%m].filter(u => !absent.has(u) && arrived.has(u) && !matched.has(u));
    if (nb.length) {
      const u = nb[Math.floor(Math.random() * nb.length)];
      matched.add(j); matched.add(u);
      steps.push({ edge: u === (j+1)%m ? j : u });
    }
  });
  return { steps, stranded: order.length - matched.size };
}

// ── ring-matching state (a bitmask per group: bit k = member k plays member k+1) ──
const onBit = (mask, k) => (mask >> k) & 1;
const popcount = x => { let c = 0; while (x) { c += x & 1; x >>= 1; } return c; };
const maskFromMatch = match => { let m = 0; match.pairs.forEach(([s]) => m |= 1 << s); return m; };
function setEdge(g, e) { const m = g.m; g.mask &= ~(1<<((e-1+m)%m)); g.mask &= ~(1<<((e+1)%m)); g.mask |= 1<<e; }
function cycleTeam(g, k) {                       // click a team: unmatched → right → left → unmatched
  const m = g.m, R = k, L = (k-1+m)%m, on = j => onBit(g.mask, j);
  const ab = g.absent || new Set();
  if (ab.has(k)) return;                         // a cancelled team can't play
  const dead = e => ab.has(e) || ab.has((e+1)%m);     // an edge needs both ends present
  const occ = j => on(j) || on((j-1+m)%m);
  if (on(R)) { if (dead(L)) g.mask &= ~(1 << R); else setEdge(g, L); }
  else if (on(L)) g.mask &= ~(1 << L);
  else {
    const cand = [R, L].filter(e => !dead(e));
    if (!cand.length) return;                    // both scheduled opponents cancelled
    const rF = !occ((k+1)%m), lF = !occ((k-1+m)%m);
    const prefer = rF || !lF ? R : L;
    setEdge(g, cand.includes(prefer) ? prefer : cand[0]);
  }
}

/* ── scene-scoped choreography ──
   Every applyScene call takes a fresh sequence number; `at(delay, fn)` callbacks scheduled by
   an earlier call are dropped, so a scene's timed script can never fire against a layout it
   wasn't written for — whether the scene changed or the same scene re-applied (resize). */
let applySeq = 0;
function sceneTimer() {
  const seq = ++applySeq;
  return { at: (delay, fn) => setTimeout(() => { if (applySeq === seq) fn(); }, delay) };
}
const refresh = () => { deriveFromGroups(); renderColors(); };   // recolour in place after a mask change
const hudEl = document.getElementById('hud');                    // small stats overlay (tallies, gauges)
const setHud = html => { hudEl.style.display = html == null ? 'none' : 'block'; if (html != null) hudEl.innerHTML = html; };

/* ───────────────── the scenes (scroll stops) ───────────────── */
const DIVRINGS = evenGroups(27, 3).map(g => splitGroups(g, 4));    // [[4,4],[4,4],[4,7]] — rings per division
const FIX   = DIVRINGS.flat();                                     // [4,4,4,4,4,7]
const BONUS_DR = evenGroups(28, 3).map(g => splitGroups(g, 4));    // [[4,4],[4,4],[4,4,4]] — the 28th makes division 3 three fours
const BONUS = BONUS_DR.flat();                                     // [4,4,4,4,4,4,4]
// one column per division, that division's rings stacked (keeps each ring within its division)
const gridFor = dr => ({ byColumn: true, divisions: dr.length,
  ringDiv: dr.flatMap((rs, d) => rs.map(() => d)), ringRow: dr.flatMap(rs => rs.map((_, r) => r)),
  divRows: Math.max(...dr.map(rs => rs.length)) });
const SPLITGRID = gridFor(DIVRINGS), BONUSGRID = gridFor(BONUS_DR);

// ── the real Monday roster, in ring (schedule) order — T(i+1) ↔ TEAMS[i] ↔ node id i ──
const TEAMS = [
  'Gina/Chris','Angelene Belle/Nick','Carly/Alex','Michele/Justin','Laura/Jeff',
  'Julie/Thom','Angela/Justin','Molly/Chris','Brittany/Shane',
  'Ashley/Dylan','Lauren/Greg','Haley/Anthony','Lindsay/Calvin','Kayla/Josh',
  'Zoey/Shawn','Viktorija/Matt','Tori/Larry','Kaylee/Sam',
  'Jakki/Caan','Molly/Ryan','Sara/Shaun','Caitlyn/Joshua','Madi/Troy',
  'Sofia/Jordan','Hannah/Taylor','Rebecca/Bryan','Sophia/Damian',
];
// the roster overlay: the week-to-week schedule-building process shown as a list of names that
// gets cut into smaller lists. Grouping reuses the exact slicing math the ring scenes use
// (sliceMembers over the same sizes), so the lists and the rings are provably the same partition.
const nameCols = kind => {                         // columns of blocks: one column per division
  const divs = sliceMembers(d3.range(27), evenGroups(27, 3));
  if (kind === 'divisions') return divs.map((ids, d) => [{ head: `Division ${d + 1} · ${ids.length} teams`, ids }]);
  return divs.map((ids, d) => sliceMembers(ids, DIVRINGS[d]).map((pids, p) =>
    ({ head: `Division ${d + 1} · pool ${p + 1}`, ids: pids })));
};
const ngEl = document.getElementById('namegrid');
const ngChips = [];                                // 27 persistent chips — they glide between groupings
const ngChip = i => ngChips[i] || (ngChips[i] = Object.assign(document.createElement('div'),
  { className: 'chip', innerHTML: `<i>T${i + 1}</i><span>${TEAMS[i]}</span>` }));
const DIV_STARTS = (() => { const s = new Set(); let t = 0;            // first chip of divisions 2 and 3
  evenGroups(27, 3).slice(0, -1).forEach(n => s.add(t += n)); return s; })();
// the flat roster's columns, computed explicitly so nothing can ever clip: each division cut
// always reserves a gap row, so opening the gaps (flatgap) never reflows chips between columns
function flatColumns() {
  const st = stage(innerWidth, innerHeight);
  const ROW = 32;                                  // chip pitch (26px circle + 6px gap); gap ≈ one row
  const cap = Math.max(6, Math.floor((st.bottom - st.top) / ROW));
  const total = 27 + DIV_STARTS.size;              // chips + reserved gap rows
  const target = Math.ceil(total / Math.ceil(total / cap));   // balance the columns (14/13, not 19/8)
  const cols = [], cuts = new Set(); let col = null, used = target;
  for (let i = 0; i < 27; i++) {
    const cut = DIV_STARTS.has(i);
    if (used + (cut && used ? 2 : 1) > target) { col = []; cols.push(col); used = 0; }
    if (cut && used) { cuts.add(i); used += 1; }   // reserve the gap row (no gap at a column top)

function renderNameGrid(kind, opts = {}) {
  if (!kind) {                                     // leaving the list scenes: fade out, then hide

      ngEl.style.opacity = '0';
      if (opts.instant) ngEl.style.display = 'none';   // the circles take over in place — no ghosts
      else setTimeout(() => { if (ngEl.style.opacity === '0') ngEl.style.display = 'none'; }, 380);
    }
    return;
  }
  const fromNodes = opts.fromNodes;                // rings → list: chips glide out of the SVG circles
  const gapped = kind === 'flatgap';               // the flat list, with space opened at division cuts
  if (gapped) kind = 'flat';
  const wasShown = ngEl.style.display === 'flex' && ngEl.style.opacity !== '0';
  const st = stage(innerWidth, innerHeight);       // same drawing area the ring scenes use
  Object.assign(ngEl.style, { display: 'flex', opacity: '1', left: st.left + 'px', top: st.top + 'px',
    width: (st.right - st.left) + 'px', height: (st.bottom - st.top) + 'px' });
  const first = new Map();                         // FLIP: where each chip was before regrouping
  if (wasShown) ngChips.forEach((c, i) => { if (c.isConnected) first.set(i, c.getBoundingClientRect()); });
  ngEl.className = kind + (gapped ? ' gapped' : '');
  const flat = kind === 'flat' ? flatColumns() : null;
  ngChips.forEach((c, i) => c.classList.toggle('cut', gapped && !!flat && flat.cuts.has(i)));
  ngEl.replaceChildren(...(flat ? flat.cols.map(ids => [{ ids }]) : nameCols(kind)).map(blocks => {
    const col = document.createElement('div'); col.className = 'ncol';
    blocks.forEach(g => {
      const b = document.createElement('div'); b.className = 'nblock';
      if (g.head) { const h = Object.assign(document.createElement('b'), { textContent: g.head });
        if (fromNodes) h.style.animationDelay = '850ms';   // headers wait for the chips to land
        b.appendChild(h); }

      g.ids.forEach(i => grid.appendChild(ngChip(i)));

    });

  }));

  ngEl.style.transform = 'none';
  const need = Math.max(1, ...[...ngEl.children].map(c => c.offsetHeight));
  const ngScale = Math.min(1, (st.bottom - st.top) / need);
  if (ngScale < 1) ngEl.style.transform = `scale(${ngScale})`;
  // re-parenting restarts CSS animations — so animate explicitly: only brand-new chips fade in,
  // surviving (or carried-over) chips don't flash — they glide via the FLIP below instead
  ngChips.forEach((c, i) => {
    c.style.animation = first.has(i) || (fromNodes && fromNodes[i]) ? 'none' : 'fadein .5s ease both';
  });
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  ngChips.forEach((c, i) => {                      // FLIP: glide from the previous layout (or the rings)
    let dx, dy;
    if (fromNodes && fromNodes[i]) {               // align the chip's circle icon onto the node it replaces
      const r = c.firstChild.getBoundingClientRect();
      dx = fromNodes[i][0] - (r.left + r.width / 2); dy = fromNodes[i][1] - (r.top + r.height / 2);
    } else {
      const f = first.get(i); if (!f) return;
      const n = c.getBoundingClientRect();
      dx = f.left - n.left; dy = f.top - n.top;
    }
    if (!dx && !dy) return;
    // FLIP deltas are screen-space; chip transforms apply inside the (possibly scaled) container
    dx /= ngScale; dy /= ngScale;
    c.style.transition = 'none'; c.style.transform = `translate(${dx}px,${dy}px)`;
    requestAnimationFrame(() => {
      c.style.transition = 'transform .8s cubic-bezier(.22,.61,.36,1)'; c.style.transform = '';
    });
  });
}

    kicker:'Make it real · step 1', title:'Cut the roster into divisions',
    body:'The first weekly cut, by standings: 8 · 8 · 11, biased toward multiples of four. Only the last team of each old nine slides over.' },

  { key:'namepools', sizes:[], names:'pools',
    kicker:'Make it real · step 2', title:'Cut each division into pools',
    body:'The second cut: pools of four (one of seven). These lists are the night’s schedule — each team plays its two pool neighbours. This is what gets posted at 2pm.' },

  { key:'firstgames', sizes:FIX, cols:3, colored:true, match:'best', interactive:true, nameLabels:true, ...SPLITGRID,
    kicker:'Make it real · step 3', title:'First games, pool by pool',
    body:'Green links are the night’s first matches; orange circles wait for a free opponent. Tap teams or games to explore any scenario.',
    run: ({ at, fromScene }) => {                  // entering from the pools list: the circles travel first,
      if (!fromScene || !fromScene.names) return;  // and the games only connect once they've settled
      groups.forEach(g => g.colored = false);
      deriveFromGroups();
      at(2000, () => {
        groups.forEach(g => { g.colored = true; g.mask = maskFromMatch(matchingFor('best', g.m)); });
        refresh();
      });
    } },
];

/* ───────────────── the persistent circles + physics ───────────────── */
let NR = 14;                                   // node radius — recomputed per viewport
const SPREAD = 0.30, CAP = 0.46;
const WAIT_OUT = 1.13;                         // unmatched teams sit this far outside the rim, in every view
let tickClock = 0, prevScene = -1;
// the 27↔nines move: each team rides OFF its source circle at a tangent, hops the gap, and rides ONTO
// its target circle to its slot — one belt routine (spoolPlan) drives both directions
let spoolActive = false;
let SPOOL = { cx: 0, cy: 0, r: 200 };          // big-circle centre/radius, captured from the "27 teams" scene
let DIVISIONS = [];                            // the three nine-ring centres, captured from the nines scene
const SPIN_OMEGA = 0.05;                         // how fast a team rides a circle (rad/tick) — slow & legible
const FLIGHT = 20;                              // ticks for the tangent hop between two circles

// reals T1..T28 carry the story; clones T1..T9 are the "hypothetical" copies for the split screen
const reals  = d3.range(28).map(i => ({ id: i,      label: 'T'+(i+1), kind:'real', spoolAngle: -Math.PI/2 + i * 2 * Math.PI / 27 }));
const clones = d3.range(9 ).map(i => ({ id: 28 + i, label: 'T'+(i+1), kind:'clone', ghost: i >= 4 }));
const nodes  = reals.concat(clones);
nodes.forEach(n => Object.assign(n, { x:0, y:0, tx:0, ty:0, state:'idle', show:false, op:1 }));

const svg     = d3.select('#graphic svg');
const gBoxes  = svg.select('g.boxes');
const gGuides = svg.select('g.guides');
const gLinks  = svg.select('g.links');
const gNodes  = svg.select('g.nodes');
const gCaps   = svg.select('g.caps');
const gFx     = svg.select('g.fx');
const cam     = svg.select('g.cam').attr('transform', 'translate(0,0) scale(1)');

/* ── feedback when a game (match) forms: a ripple out from each circle + a subtle buzz ──
   Every match — tapped or scene-driven — ends up as a non-"want" edge in LINKS, so we
   diff the edge set each paint and react to the ones that just appeared. */
const reduceMotion = () => matchMedia('(prefers-reduced-motion: reduce)').matches;
let prevEdgeKeys   = new Set();  // game-edges shown on the previous paint
let userAction     = false;      // a tap is in flight — only those buzz, autoplay stays silent
let sceneBaselined = false;      // a scene's first paint is the baseline; matches forming after it splash

const RIPPLE = ['#34d399', '#86efac', '#6ee7b7'];   // the pairing-link greens
function splash(node) {                              // concentric rings ripple outward from a circle as it connects
  if (reduceMotion() || !node) return;
  const x = node.x, y = node.y, rings = 2;
  for (let i = 0; i < rings; i++) {
    gFx.append('circle').attr('cx', x).attr('cy', y).attr('fill', 'none')
      .attr('stroke', RIPPLE[i % RIPPLE.length]).attr('stroke-width', NR * 0.3)
      .attr('r', NR * 0.9).attr('opacity', 0.55)
      .transition().delay(i * 130).duration(640).ease(d3.easeCubicOut)
        .attr('r', NR * (3.1 + i * 0.7))           // expand past the rim, thinning and fading like water
        .attr('stroke-width', NR * 0.05).attr('opacity', 0)
        .remove();
  }
}
function buzz() { if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} } }

function fxFromLinks() {                              // called at the tail of every renderLinks
  const cur = new Set();
  LINKS.forEach(d => { if (!d.want) cur.add(Math.min(d.a, d.b) + '-' + Math.max(d.a, d.b)); });
  const fresh = [];
  cur.forEach(k => { if (!prevEdgeKeys.has(k)) fresh.push(k); });
  prevEdgeKeys = cur;
  if (!sceneBaselined) { sceneBaselined = true; userAction = false; return; }   // games already there on arrival
  if (fresh.length && !reduceMotion()) {             // every game that forms after that splashes…
    const sceneAt = current;
    fresh.forEach((k, i) => setTimeout(() => {       // …cascaded, so a whole schedule ripples in, never bursts
      if (current !== sceneAt) return;
      const [a, b] = k.split('-').map(Number); splash(nodes[a]); splash(nodes[b]);
    }, i * 55));
    if (userAction) buzz();
  }
  userAction = false;
}


const nodeSel = gNodes.selectAll('g.team').data(nodes).join(enter => {
  const g = enter.append('g').attr('class', 'team');
  g.append('circle').attr('r', NR).attr('class', 'idle');
  g.append('text').text(d => d.label);
  g.append('title').text(d => d.id < 27 ? `${d.label} · ${TEAMS[d.id]}` : d.label);   // hover: real name
  g.append('text').attr('class', 'nname').attr('opacity', 0)                          // name around the ring
    .text(d => d.id < 27 ? TEAMS[d.id] : '');
  return g;
});

const ringRadius = (m, cellW, cellH) => {
  const minDim = Math.min(cellW, cellH);
  const gap = 2 * (NR + 4) + 8;
  const rFit = m > 1 ? gap / (2 * Math.sin(Math.PI / m)) : 0;
  return clamp(Math.max(rFit, minDim * SPREAD), Math.max(20, NR + 8), minDim * CAP);
};

// live state shared by layout, painting and clicks
let groups = [];           // [{key, members, m, mask, colored, interactive, cx, cy, r}]
let LINKS  = [];           // [{a, b, op}]
const capText = {};        // key → caption string
const groupOf = id => groups.find(g => g.members.includes(id));

/* ── turn a scene into per-node targets, guides, captions ── */
function computeLayout(scene) {
  const W = innerWidth, H = innerHeight, phone = W < 620;
  groups = []; LINKS = [];
  nodes.forEach(nd => { nd._wasShown = nd.show; nd.show = false; nd.op = 1; nd.state = 'idle'; });
  const out = scene.detail ? detailLayout(scene, W, H, phone) : gridLayout(scene, W, H, phone);
  nodes.forEach(nd => { if (!nd.show) {
    if (nd.id === 27) { nd.tx = W + 90; nd.ty = H * 0.72; }      // T28 waits off the right edge to fly in
    else if (nd._wasShown) { nd.tx = nd.x; nd.ty = nd.y; }       // just hidden → fade out where it stands, don't move
    else { nd.tx = W/2 + (nd.id % 6 - 3) * 9; nd.ty = H + 90; }  // long-hidden → parked offscreen (enters from bottom)
  } });
  return out;
}

function gridLayout(scene, W, H, phone) {
  NR = clamp(Math.min(W, H) / 46, 7, 14);
  const sizes = scene.sizes, nG = sizes.length, st = stage(W, H);
  if (!nG) return { guides: [], caps: [], divider: null, boxes: [] };   // list-only scene: no circles
  const left = st.left, right = st.right, top = st.top, bottom = st.bottom;
  phone = st.phone;
  // byColumn: one column per division, that division's rings stacked — keeps each ring within its division
  const cols = scene.byColumn ? scene.divisions
    : clamp(Math.floor((right - left) / (phone ? 120 : 170)), 1, Math.min(scene.cols, nG));
  const rows = scene.byColumn ? scene.divRows : Math.ceil(nG / cols);
  const cellW = (right - left) / cols, cellH = (bottom - top) / rows;
  const ids = d3.range(scene.extra ? 28 : 27);
  const gm = sliceMembers(ids, sizes);
  const guides = [], caps = [], divInfo = {};

  gm.forEach((members, gi) => {
    let row, colInRow, inRow;
    if (scene.byColumn) { colInRow = scene.ringDiv[gi]; row = scene.ringRow[gi]; inRow = cols; }   // its division's column
    else { row = Math.floor(gi / cols); inRow = Math.min(cols, nG - row * cols); colInRow = gi - row * cols; }
    const rowPad = (cols - inRow) / 2 * cellW;
    const cx = left + rowPad + (colInRow + 0.5) * cellW, cy = top + (row + 0.5) * cellH;
    const m = members.length;
    const slots = (scene.reserveLast && gi === gm.length - 1) ? m + 1 : m;   // reserve an empty slot for a newcomer
    // byColumn scenes share slot-keyed guides so every ring morphs across story beats; ring 0 of the
    // fours shares the split screen's 'L' key so its circle is also reused across the camera cuts
    const r = ringRadius(slots, cellW, cellH),
          key = scene.byColumn ? (gi === 0 && m === 4 ? 'L' : 'ring' + gi) : scene.key + ':' + gi;
    guides.push({ key, cx, cy, r });
    const mask = scene.colored ? maskFromMatch(matchingFor(scene.match, m)) : 0;
    groups.push({ key, members, m, mask, colored:!!scene.colored, interactive:!!scene.interactive, cx, cy, r });
    const isSpool = nG === 1 && m === 27;        // the big ring uses the optimized per-team headings
    members.forEach((id, j) => {
      const a = isSpool ? nodes[id].spoolAngle : -Math.PI/2 + j * 2 * Math.PI / slots, nd = nodes[id];
      nd.show = true; nd.op = 1; nd.tx = cx + r * Math.cos(a); nd.ty = cy + r * Math.sin(a);
    });
    caps.push({ key, x: cx, y: cy + r + (phone ? 24 : 32), cls: '' });
    if (scene.byColumn) {                        // track each division's extent for its grouping box
      const d = scene.ringDiv[gi], inf = divInfo[d] || (divInfo[d] = { cx, t: Infinity, b: -Infinity, r: 0 });
      inf.cx = cx; inf.r = Math.max(inf.r, r); inf.t = Math.min(inf.t, cy - r); inf.b = Math.max(inf.b, cy + r);
    }
  });
  const boxes = [];
  if (scene.byColumn) {                          // a labelled box around each division's rings
    const pad = phone ? 12 : 20, labelH = 30;
    Object.keys(divInfo).forEach(d => { const f = divInfo[d];
      boxes.push({ key:'box'+d, x: f.cx - f.r - pad, y: f.t - labelH - pad/2, w: 2*(f.r + pad), h: (f.b - f.t) + labelH + pad*1.5,
        label: 'Division ' + (+d + 1), lx: f.cx, ly: f.t - labelH + 4 });
    });
  }
  if (nG === 1 && groups[0]) SPOOL = { cx: groups[0].cx, cy: groups[0].cy, r: groups[0].r };   // the spool
  if (nG === 3 && sizes[0] === 9) DIVISIONS = groups.map(g => ({ cx: g.cx, cy: g.cy, r: g.r, members: g.members }));
  return { guides, caps, divider: null, boxes };
}

/* ── the split-screen detail step: ring of four (real) vs the same four in a nine (clones) ── */
// geometry of the detail split-screen — shared with the zoom camera so the ring of four is
// exactly the same size in the "zoom" step as in this comparison step
function detailGeom(W, H) {
  const st = stage(W, H);
  const portrait = st.phone && !st.short;           // stacked only on a narrow portrait phone
  const sw = st.right - st.left, sh = st.bottom - st.top, scx = (st.left + st.right) / 2, scy = (st.top + st.bottom) / 2;
  const dNR = clamp(Math.min(W, H) / (portrait ? 42 : 30), 9, 18);
  let aC, bC, cellW, cellH, divider;
  if (portrait) {                                   // stacked: the four on top, the nine below, well separated
    aC = [scx, st.top + sh * 0.20]; bC = [scx, st.top + sh * 0.76];
    cellW = sw * 0.92; cellH = sh * 0.34;
    divider = { x1: st.left, y1: st.top + sh * 0.48, x2: st.right, y2: st.top + sh * 0.48 };
  } else {                                          // side-by-side within the stage (handles short/landscape)
    aC = [st.left + sw * 0.27, scy]; bC = [st.left + sw * 0.73, scy];
    cellW = sw * 0.42; cellH = sh * 0.80;
    divider = { x1: scx, y1: st.top + 6, x2: scx, y2: st.bottom - 6 };
  }
  const saved = NR; NR = dNR;                       // ringRadius reads the (detail) node radius
  const rA = ringRadius(4, cellW, cellH), rB = ringRadius(9, cellW, cellH);
  NR = saved;
  return { aC, bC, rA, rB, divider, dNR, portrait, top: st.top, bottom: st.bottom };
}

function detailLayout(scene, W, H, phone) {
  const geom = detailGeom(W, H);
  NR = geom.dNR;
  const guides = [], caps = [];
  const { aC, bC, rA, rB, divider } = geom;
  // titles: one shared top baseline when side-by-side. Stacked (portrait) pins the middle pair —
  // the top ring's count and the bottom ring's title — to either side of the divider, so the two
  // stacks structurally can't collide; the bottom count clamps inside the stage.
  const tA = geom.portrait ? aC[1] - rA * WAIT_OUT - NR - 22 : geom.top + 26;
  const tB = geom.portrait ? divider.y1 + 20 : geom.top + 26;
  const tShared = geom.portrait ? null : Math.min(tA, tB);
  const cY = geom.portrait
    ? [divider.y1 - 14, Math.min(bC[1] + rB * WAIT_OUT + 34, geom.bottom - 10)]
    : [null, null];
  const enter = geom.portrait ? 'left' : 'top';     // portrait (stacked) → enter from the left; landscape → top

  scene.sides(scene).forEach((s, si) => {           // [left, right] ring specs from the scene config
    const cx = si ? bC[0] : aC[0], cy = si ? bC[1] : aC[1], r = si ? rB : rA;
    placeDetailRing(s.ids, cx, cy, r, s.mask,
      { lateSlot: s.lateSlot ?? -1, stage: scene.stage, m: s.m, ghostFrom: s.ghostFrom ?? 99,
        absent: s.absent, pending: s.pending, ghostMask: s.ghostMask, interactive: !!scene.interactive,
        key: si ? 'R' : 'L', enter, titleY: tShared ?? (si ? tB : tA), countY: cY[si] },
      guides, caps, s.title, s.count);
  });
  return { guides, caps, divider };
}

function placeDetailRing(ids, cx, cy, r, mask, opt, guides, caps, title, count) {
  const m = opt.m, absent = new Set(opt.absent || []), pending = opt.pending || new Set();
  guides.push({ key: opt.key, cx, cy, r });
  // detail rings register as groups too, keyed to their count caption — click-to-re-pair works the
  // same as on the grids (deriveFromGroups then repaints states, links and the caption)
  groups.push({ key: opt.key + '-c', members: ids, m, mask, colored: true,
    interactive: !!opt.interactive, cx, cy, r, absent, ghostFrom: opt.ghostFrom });
  const okEdge = k => onBit(mask, k) && !absent.has(k) && !absent.has((k+1)%m);   // a game needs both teams
  const play = new Set();
  for (let k = 0; k < m; k++) if (okEdge(k)) { play.add(k); play.add((k+1)%m); }

  ids.forEach((id, j) => {
    const nd = nodes[id], a = -Math.PI/2 + j * 2 * Math.PI / m, ghost = j >= opt.ghostFrom;
    nd.show = true;
    if (j === opt.lateSlot && opt.stage === 'setup') {        // hasn't arrived: parked outside, dim
      if (opt.enter === 'left') { nd.tx = cx - r * 1.95; nd.ty = cy; }                 // enters from the left
      else { nd.tx = cx; nd.ty = opt.titleY + NR + 20; }                               // enters from the top, below the title
      nd.state = 'idle'; nd.op = 0.38;
    } else {                                                  // in the ring; the stranded sit just outside the rim
      const st = absent.has(j) ? 'absent'                     // cancelled: ✕'d, stays on the rim
        : pending.has(j) ? 'idle'                             // hasn't arrived yet (replay scenes)
        : absent.has((j+1)%m) && absent.has((j-1+m)%m) ? 'isolated'   // both scheduled opponents cancelled
        : play.has(j) ? 'play' : 'wait';
      const R = r * (st === 'wait' ? WAIT_OUT : 1);
      nd.tx = cx + R * Math.cos(a); nd.ty = cy + R * Math.sin(a);
      nd.state = st;
      nd.op = (ghost && j !== opt.lateSlot) ? 0.4 : 1;
    }
    if (!nd._wasShown) { nd.x = nd.tx; nd.y = nd.ty; }        // brand-new circles just fade in at their spot, no fly
  });
  for (let k = 0; k < m; k++) if (okEdge(k)) {
    const ghostLink = k >= opt.ghostFrom || (k+1)%m >= opt.ghostFrom;
    LINKS.push({ a: ids[k], b: ids[(k+1)%m], op: ghostLink ? 0.4 : 0.9 });
  }
  if (opt.ghostMask) for (let k = 0; k < m; k++)            // the pairing a director would have found — faint
    if (onBit(opt.ghostMask, k) && !okEdge(k) && !absent.has(k) && !absent.has((k+1)%m))
      LINKS.push({ a: ids[k], b: ids[(k+1)%m], op: 0.15 });
  caps.push({ key: opt.key + '-t', x: cx, y: opt.titleY, cls: 'title' });
  capText[opt.key + '-t'] = title;
  caps.push({ key: opt.key + '-c', x: cx, y: opt.countY ?? (cy + r * WAIT_OUT + 34), cls: '' });
  capText[opt.key + '-c'] = count;
  if (opt.stage === 'setup') {                              // "running late" tag sits with the parked T1, clear of the title
    const nx = opt.enter === 'left' ? cx - r * 1.95 : cx;
    const ny = opt.enter === 'left' ? cy + 28 : opt.titleY + NR * 2 + 38;
    caps.push({ key: opt.key + '-n', x: nx, y: ny, cls: 'note' });
    capText[opt.key + '-n'] = 'T1 · running late';
  }
}

/* ── derive node colours + links + captions from the groups' masks (grid scenes) ── */
function deriveFromGroups() {
  LINKS = [];
  groups.forEach(g => {
    const ab = g.absent || new Set();            // member indices who cancelled (✕'d, can't play)
    if (!g.colored) { g.members.forEach(id => nodes[id].state = 'idle'); capText[g.key] = g.m + ' teams'; return; }
    g.members.forEach((id, k) => nodes[id].state =
      ab.has(k) ? 'absent'
      : ab.has((k+1)%g.m) && ab.has((k-1+g.m)%g.m) ? 'isolated'   // both scheduled opponents cancelled
      : 'wait');
    let links = 0;
    for (let k = 0; k < g.m; k++) if (onBit(g.mask, k) && !ab.has(k) && !ab.has((k+1)%g.m)) {
      const a = g.members[k], b = g.members[(k+1)%g.m];
      const ghost = g.ghostFrom != null && (k >= g.ghostFrom || (k+1)%g.m >= g.ghostFrom);
      nodes[a].state = 'play'; nodes[b].state = 'play'; LINKS.push({ a, b, op: ghost ? 0.4 : 0.9 }); links++;
    }
    g.members.forEach(id => {                    // the stranded sit just outside the rim, the matched on it
      const nd = nodes[id], a = Math.atan2(nd.ty - g.cy, nd.tx - g.cx);
      const R = g.r * (nd.state === 'wait' ? WAIT_OUT : 1);
      nd.tx = g.cx + R * Math.cos(a); nd.ty = g.cy + R * Math.sin(a);
    });
    const present = g.m - ab.size, waits = present - 2 * links;
    capText[g.key] = ab.size ? `${present} present · ${waits ? waits + ' waiting' : 'all playing'}`
                             : waits ? `${g.m} · ${waits} waiting` : `${g.m} · all playing`;
  });
}

/* ── paint colours + links + caption text without moving anything (used after clicks) ── */
function renderColors() {
  nodeSel.select('circle').attr('class', d => d.show ? d.state : 'idle');
  nodeSel.select('text').text(d => d.state === 'absent' ? '✕' : d.label);   // cancelled teams read as ✕
  renderLinks(true);
  gCaps.selectAll('text.gcap').text(d => capText[d.key] || '');
}

function renderLinks(animate) {
  const key = d => Math.min(d.a, d.b) + '-' + Math.max(d.a, d.b);
  gLinks.selectAll('line.pair').data(LINKS, key).join(
    enter => enter.append('line').attr('class', d => d.want ? 'pair want' : 'pair').attr('opacity', 0)
      .call(e => e.transition().delay(animate ? 140 : 0).duration(animate ? 450 : 0).attr('opacity', d => d.op ?? 0.9)),
    upd => upd.call(u => u.attr('class', d => d.want ? 'pair want' : 'pair')
      .transition().duration(300).attr('opacity', d => d.op ?? 0.9)),
    exit => exit.call(e => e.transition().duration(animate ? 250 : 0).attr('opacity', 0).remove())
  );
  gLinks.selectAll('line.hit').data(LINKS, key).join(
    enter => enter.append('line').attr('class', 'hit').on('click', (ev, d) => onLinkClick(d)),
    upd => upd, exit => exit.remove()
  );
  const live = scenes[current].interactive;
  gLinks.selectAll('line.hit').style('pointer-events', live ? 'stroke' : 'none').style('cursor', live ? 'pointer' : 'default');
  // place every line immediately so new ones are correct even while the sim is at rest
  gLinks.selectAll('line').attr('x1', d => nodes[d.a].x).attr('y1', d => nodes[d.a].y)
    .attr('x2', d => nodes[d.b].x).attr('y2', d => nodes[d.b].y);
  fxFromLinks();                                     // splash/buzz any game-edge that just formed
}

/* ───────────────── apply a scene ───────────────── */
let current = 0;
function applyScene(i) {
  const sc = scenes[i], fromSc = scenes[prevScene];
  sceneBaselined = false;                            // this scene's first paint becomes the splash baseline
  // split screen ↔ four-ring grid is a pure camera move: every ring is laid out at its final spot up
  // front and only the camera travels, framed so the ring of four renders exactly where it was at the cut.
  // Everything that leaves is remapped into the new frame so it fades in place while riding the move.
  const toDetail   = !!fromSc && !fromSc.detail && sc.detail;
  const fromDetail = !!fromSc && fromSc.detail && !sc.detail;
  const ring0Prev  = toDetail && groups.length && groups[0].m === 4
    ? { cx: groups[0].cx, cy: groups[0].cy, r: groups[0].r } : null;
  current = i;
  SCENE_CARD = CARDS_H[i] || CARD_H;                 // this scene's stage avoids this scene's card
  const { at } = sceneTimer();                       // this scene's timer scope; cancels all earlier ones
  setHud(null);                                      // scenes that use the HUD repopulate it from their run hook
  document.getElementById('tapnote').style.display = sc.interactive ? 'block' : 'none';
  sim.force('attract', null);                        // scene-scoped link attraction — a run hook may reinstall it
  // roster-list scenes use the chip overlay; entering divisions from the flat list is staged —
  // the list first opens gaps at the division boundaries, then rearranges into columns
  const fromFlat = sc.names === 'divisions' && !!fromSc && fromSc.names === 'flat';
  // list ↔ rings: whichever side takes over starts on the other's exact spots, and the replaced
  // side hides instantly (no fading ghosts) — capture positions before anything moves
  const listToRings = !!fromSc && !!fromSc.names && !sc.names && !!(sc.sizes && sc.sizes.length);
  const ringsToList = !!fromSc && !fromSc.names && !!sc.names && !!(fromSc.sizes && fromSc.sizes.length);
  const chipRects = listToRings
    ? ngChips.map(c => c && c.isConnected ? c.firstChild.getBoundingClientRect() : null) : null;
  const nodeFrom = ringsToList ? nodes.map(n => n.show && n.id < 27 ? [n.x, n.y] : null) : null;
  renderNameGrid(fromFlat ? 'flatgap' : sc.names || null, { instant: listToRings, fromNodes: nodeFrom });
  if (fromFlat) at(1100, () => renderNameGrid('divisions'));
  const relayout = () => {                           // re-run this scene's layout mid-script (its state changed)

    nodes.forEach(n => {                             // fully visible the same frame the grid hides (no blink)

  // previous camera frame, read live so an interrupted move still cuts seamlessly
  const camM = cam.node().transform.baseVal.consolidate();
  const s0 = camM ? camM.matrix.a : 1, t0x = camM ? camM.matrix.e : 0, t0y = camM ? camM.matrix.f : 0;
  let camSnap = null, s1 = 1, t1x = 0, t1y = 0;
  const g0 = fromDetail ? (groups.length && groups[0].m === 4 ? groups[0] : null) : ring0Prev;
  if ((toDetail || fromDetail) && g0) {
    const gz = detailGeom(innerWidth, innerHeight);
    const ringA = { x: gz.aC[0], y: gz.aC[1], r: gz.rA }, ring0 = { x: g0.cx, y: g0.cy, r: g0.r };

  const remapX = v => (s0 * v + t0x - t1x) / s1, remapY = v => (s0 * v + t0y - t1y) / s1;
  if (sc.run) sc.run({ at, scene: sc, relayout, fromScene: fromSc });   // the scene's timed choreography

  const enterDelay = listToRings ? 1300 : 0;         // circles/text travel first; rings & chrome fade in after

  const fs = Math.max(7.5, NR * 0.86);
  if (camZoom) {   // counter the camera jump so apparent sizes stay continuous, then ease to the new size with the move

    .attr('x', NR + 9).attr('y', 0)                  // and simply ride along with it
    .each(function (d) {
      const el = d3.select(this);

  prevScene = i;

  // collision: off for swaps/clean belt riding; but on compact screens keep a gentle radius during the belt so

  gBoxes.selectAll('g.divbox-g').data(boxes, d => d.key).join(
    enter => { const g = enter.append('g').attr('class', 'divbox-g')      // CSS fades opacity, not d3 (no interrupts)
        .style('animation-delay', enterDelay ? enterDelay + 'ms' : null);
      g.append('rect').attr('class', 'divbox').attr('rx', 16);
      g.append('text').attr('class', 'gcap divlabel');
      return g.each(function (d) { const b = d3.select(this);
        b.select('rect').attr('x', d.x).attr('y', d.y).attr('width', d.w).attr('height', d.h);
        b.select('text').attr('x', d.lx).attr('y', d.ly).text(d.label);
      }); },
    upd => upd.each(function (d) { const b = d3.select(this);             // reflowed layout → morph, don't jump
      b.interrupt().style('animation', null).style('opacity', null);     // cancel a mid-exit fade if re-adopted
      b.select('rect').transition().duration(500)
        .attr('x', d.x).attr('y', d.y).attr('width', d.w).attr('height', d.h);

    exit => exit.each(function () { const g = d3.select(this);   // ride the camera at the remapped spot while fading

           .attr('width', +r.attr('width') * remapScale).attr('height', +r.attr('height') * remapScale);
          tl.attr('x', remapX(+tl.attr('x'))).attr('y', remapY(+tl.attr('y'))); }
      }).call(e => e.style('animation', 'none').transition().duration(350).style('opacity', 0).remove())
  );

    enter => enter.append('circle').attr('class', 'guide')
      .attr('cx', d => d.cx).attr('cy', d => d.cy).attr('r', d => d.r).attr('opacity', 0)
      .call(e => e.transition().delay(enterDelay).duration(550).attr('opacity', 0.9)),
    upd => upd.call(u => (camZoom ? u.interrupt() : u.interrupt().transition().duration(500))   // interrupt revives any
      .attr('cx', d => d.cx).attr('cy', d => d.cy).attr('r', d => d.r).attr('opacity', 0.9)),   // mid-exit re-adoption
    exit => exit.call(e => { if (camZoom) e.interrupt()
        .attr('cx', function () { return remapX(+this.getAttribute('cx')); })
        .attr('cy', function () { return remapY(+this.getAttribute('cy')); })
        .attr('r',  function () { return +this.getAttribute('r') * remapScale; });
      e.transition().duration(350).attr('opacity', 0).remove(); })
  );

  const dv = d3.select('.divider');
  if (divider) dv.attr('x1', divider.x1).attr('y1', divider.y1).attr('x2', divider.x2).attr('y2', divider.y2)
                 .interrupt().transition().duration(550).attr('opacity', 0.8);
  else {
    dv.interrupt();

      .call(e => e.transition().delay(enterDelay).duration(550).attr('opacity', 1)),
    upd => upd.call(u => { u.attr('class', d => 'gcap ' + (d.cls || '')).text(d => capText[d.key] || '');

        .attr('x', d => d.x).attr('y', d => d.y).attr('opacity', 1); }),              // mid-exit re-adoption
    exit => exit.call(e => { if (camZoom) e.interrupt()

}

// custom pull-to-target force: reads each node's live target, and holds a node still until its
// per-node `delay` (in ticks) has elapsed — that's what staggers the circles one after another
/* ── belt/spool geometry — shared by both transition directions (DRY) ── */
const onArc   = (c, a) => [c.cx + c.r * Math.cos(a), c.cy + c.r * Math.sin(a)];
const ccwDist = (from, to) => { let d = (from - to) % (2 * Math.PI); return d < 0 ? d + 2 * Math.PI : d; }; // CCW = decreasing angle
const lerp2   = (p, q, t) => [p[0] + (q[0] - p[0]) * t, p[1] + (q[1] - p[1]) * t];
// external-tangent angle on circle a toward circle b (CCW-leading side); null if ~concentric
function tangentAngle(a, b) {
  const dx = b.cx - a.cx, dy = b.cy - a.cy, dist = Math.hypot(dx, dy);
  if (dist < Math.max(a.r, b.r) * 0.25) return null;
  return Math.atan2(dy, dx) + Math.acos(clamp((a.r - b.r) / dist, -1, 1));
}
// ride OFF `src` at a tangent → straight hop → ride ONTO `tgt` to its slot. One routine, used both ways.
function spoolPlan(src, srcAngle, tgt, tgtAngle) {
  const legs = [];
  const arc  = (c, from, to) => { const span = ccwDist(from, to); legs.push({ arc: c, from, span, dur: span / SPIN_OMEGA }); };
  const line = (p, q) => legs.push({ p, q, dur: FLIGHT });
  const psi = tangentAngle(src, tgt);                            // tangent touches both circles at the same heading
  if (psi == null) {                                             // concentric (centre division) → smooth spiral in/out
    const sweep = ccwDist(srcAngle, tgtAngle);
    legs.push({ spiral: true, fromC: src, fromR: src.r, fromA: srcAngle, toC: tgt, toR: tgt.r, toA: tgtAngle,
                sweep, dur: Math.max(sweep, Math.PI) / SPIN_OMEGA });
  } else { arc(src, srcAngle, psi); line(onArc(src, psi), onArc(tgt, psi)); arc(tgt, psi, tgtAngle); }
  let t0 = 0; legs.forEach(l => { l.t0 = t0; t0 += l.dur; });
  return legs;
}
// position along a plan at elapsed tick `t` (stays at the slot once finished)
function spoolPoint(legs, t) {
  const last = legs[legs.length - 1];
  for (const l of legs) if (t < l.t0 + l.dur || l === last) {
    const p = clamp((t - l.t0) / l.dur, 0, 1);
    if (l.arc) return onArc(l.arc, l.from - l.span * p);
    if (l.spiral) {                                               // interpolate centre, radius and angle together
      const cx = l.fromC.cx + (l.toC.cx - l.fromC.cx) * p, cy = l.fromC.cy + (l.toC.cy - l.fromC.cy) * p;
      const R = l.fromR + (l.toR - l.fromR) * p, a = l.fromA - l.sweep * p;
      return [cx + R * Math.cos(a), cy + R * Math.sin(a)];
    }
    return lerp2(l.p, l.q, p);
  }
}

// pure geometry of a grid scene (same math as gridLayout) so the spool can be optimized up front
// the drawing area, leaving room for the card: bottom strip in portrait/desktop, left strip when short (landscape phone)
let CARD_H = 280, CARDS_H = [], SCENE_CARD = 0;    // per-card measured heights — each scene's stage
const measureCards = () => {                       // reserves ITS OWN card, so content never sits under one
  const cs = [...document.querySelectorAll('.card')];
  if (cs.length) { CARDS_H = cs.map(c => c.offsetHeight); CARD_H = Math.max(...CARDS_H); }
};
function stage(W, H) {
  const phone = W < 620, short = H < 560, ch = SCENE_CARD || CARD_H;
  if (short) { const cardW = Math.min(330, W * 0.40); return { left: cardW + 26, right: W - 22, top: 38, bottom: H - 22, phone, short }; }
  return { left: phone ? 18 : 44, right: W - (phone ? 18 : 44),
           top: phone ? 60 : 84,
           bottom: H - (phone ? Math.min(ch + H * 0.03 + 12, H * 0.52)
                             : Math.max(188, ch + H * 0.09 + 12)), phone, short };
}

function layoutGeom(sizes, sceneCols) {
  const W = innerWidth, H = innerHeight, nG = sizes.length, st = stage(W, H);
  const left = st.left, right = st.right, top = st.top, bottom = st.bottom;
  const cols = clamp(Math.floor((right - left) / (st.phone ? 120 : 170)), 1, Math.min(sceneCols, nG));
  const rows = Math.ceil(nG / cols);
  const cellW = (right - left) / cols, cellH = (bottom - top) / rows;
  const saved = NR; NR = clamp(Math.min(W, H) / 46, 7, 14);
  const out = sizes.map((m, gi) => {
    const row = Math.floor(gi / cols), inRow = Math.min(cols, nG - row * cols), colInRow = gi - row * cols;
    const rowPad = (cols - inRow) / 2 * cellW;
    return { cx: left + rowPad + (colInRow + 0.5) * cellW, cy: top + (row + 0.5) * cellH, r: ringRadius(m, cellW, cellH) };
  });
  NR = saved;
  return out;
}

// placement on the spool: strictly sequential — T1, T2, … T27 in order around the ring — rotated
// so division 1's arc starts at its belt tangent (its unwind rides stay short). The other
// divisions simply ride further along the spool to their own tangents; spoolPlan is exact for
// any distance, so the 27 ↔ three-nines belt works unchanged, just with longer, more visible rides.
function optimizeSpool() {
  const spool = layoutGeom([27], 1)[0], divs = layoutGeom([9, 9, 9], 3);
  SPOOL = spool;
  const psi = tangentAngle(spool, divs[0]) ?? -Math.PI / 2;
  const step = 2 * Math.PI / 27;
  for (let i = 0; i < 27; i++) nodes[i].spoolAngle = psi + i * step;
}

// set each node's belt plan for the prevScene→idx move (shared by applyScene and the precompute spec builder)
function setupTransition(prevIdx, idx) {
  const a = scenes[prevIdx], b = scenes[idx];      // the 27-ring ↔ three-nines move, keyed by scene
  const unwind = !!a && !!b && a.key === 'all' && b.key === 'today';
  const wind   = !!a && !!b && a.key === 'today' && b.key === 'all';
  spoolActive = unwind || wind;
  // both directions use the SAME forward plan (spool → division-slot, both ends derived from
  // layout geometry, never live positions — so the precomputed spec is identical too); winding
  // back just plays that plan in reverse (planRev), retracing the exact same belt
  const slotAngle = (div, id) => -Math.PI / 2 + div.members.indexOf(id) * 2 * Math.PI / div.members.length;
  nodes.forEach(d => {
    d.plan = null; d.planRev = false;
    if (!spoolActive || !d.show || d.id >= 27) return;
    if (unwind) { const g = groups.find(gr => gr.members.includes(d.id));
      d.plan = spoolPlan(SPOOL, d.spoolAngle, g, Math.atan2(d.ty - g.cy, d.tx - g.cx)); }
    else { const src = DIVISIONS.find(div => div.members.includes(d.id));
      if (src) { d.plan = spoolPlan(SPOOL, d.spoolAngle, src, slotAngle(src, d.id));
        d.planRev = true; } }
  });
  return spoolActive;
}

/* ───────────────── precompute transitions in a worker, replay them at runtime ───────────────── */
// scripted scenes stay on the live sim (live/reoptimize flags, detail split-screens, roster lists); rest precompute
const PRECOMP_SKIP = i => { const sc = scenes[i]; return !!(sc.live || sc.reoptimize || sc.detail || sc.names); };
const transKey = (a, b) => a + '>' + b;
const frameCache = {};                            // key → Float32Array (settled-prev → targets), for the current size

// build a serializable spec for the from→to transition (clobbers the live layout state; caller resets after)
function buildSpec(from, to) {
  SCENE_CARD = CARDS_H[from] || CARD_H;           // match each scene's live stage exactly
  computeLayout(scenes[from]);
  const start = nodes.map(n => [n.tx, n.ty]);     // settled FROM = its targets (rings sit exactly on their slots)
  SCENE_CARD = CARDS_H[to] || CARD_H;
  computeLayout(scenes[to]);
  if (!scenes[to].detail) deriveFromGroups();
  const active = setupTransition(from, to);
  const compact = innerWidth < 620 || innerHeight < 560;
  return {
    key: transKey(from, to),
    start,
    target: nodes.map(n => ({ tx: n.tx, ty: n.ty, show: n.show, plan: n.plan, rev: n.planRev })),
    collide: nodes.map(n => !n.show ? 0 : active ? (compact ? NR * 0.85 : 0) : NR + 4),
    alphaTarget: active ? 0.12 : 0,
    maxTicks: 900
  };
}

        const v = nodes[i].vx*nodes[i].vx + nodes[i].vy*nodes[i].vy; if (v > mv) mv = v; }
      frames.push(f);
      if (T > planEnd + 4 && mv < 0.04) break; }   // stop once everything has effectively come to rest
    const arr = new Float32Array(frames.length * N * 2);
    for (let k=0;k<frames.length;k++) arr.set(frames[k], k*N*2);
    results.push({ key: spec.key, n: N, frames: frames.length, data: arr }); buffers.push(arr.buffer);
  }
  postMessage(results, buffers);
};`;
let worker = null;
try {
  worker = new Worker(URL.createObjectURL(new Blob([WORKER_SRC], { type: 'text/javascript' })));
  worker.onmessage = e => e.data.forEach(r => { frameCache[r.key] = r.data; });
  worker.onerror = () => { worker = null; };   // CDN/import failure → fall back to the live sim, no crash
} catch (_) { worker = null; }   // no worker → always live (graceful)

// (re)build all precomputable specs for the current size and hand them to the worker
function precomputeAll() {
  if (!worker) return;
  const N = scenes.length, specs = [];
  for (let a = 0; a < N; a++) for (const b of [a - 1, a + 1]) {
    if (b < 0 || b >= N || PRECOMP_SKIP(a) || PRECOMP_SKIP(b)) continue;
    specs.push(buildSpec(a, b));
  }
  cacheSize = innerWidth + 'x' + innerHeight;
  for (const k in frameCache) delete frameCache[k];
  worker.postMessage(specs);
}

// replay precomputed frames instead of running the live sim
let replayRAF = 0;
function replayFrames(arr) {
  sim.stop(); cancelAnimationFrame(replayRAF);
  const N = nodes.length, total = arr.length / (N * 2);
  let f = 0;
  (function step() {
    const base = f * N * 2;
    for (let i = 0; i < N; i++) { nodes[i].x = arr[base + i * 2]; nodes[i].y = arr[base + i * 2 + 1]; }
    renderPositions();
    if (++f < total) replayRAF = requestAnimationFrame(step);
  })();
}

function targetForce() {
  let ns;
  const add = (d, tx, ty, k, a) => { d.vx += (tx - d.x) * k * a; d.vy += (ty - d.y) * k * a; };
  const f = alpha => {
    for (const d of ns) {
      if (!d.show) continue;
      if (spoolActive && d.plan) {                 // planRev: play the same belt backwards (today → all)
        const end = d.plan[d.plan.length - 1].t0 + d.plan[d.plan.length - 1].dur;
        const pt = spoolPoint(d.plan, d.planRev ? Math.max(0, end - tickClock) : tickClock);
        add(d, pt[0], pt[1], 0.5, alpha);
      }
      else add(d, d.tx, d.ty, 0.035, alpha);
    }
  };
  f.initialize = _ => ns = _;
  return f;
}

// paint current node positions to the DOM (shared by the live sim tick and the precomputed replay)
function renderPositions() {
  nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  gLinks.selectAll('line')
    .attr('x1', d => nodes[d.a].x).attr('y1', d => nodes[d.a].y)
    .attr('x2', d => nodes[d.b].x).attr('y2', d => nodes[d.b].y);
}

// physics: gentle pull toward each slot + collision; slow, graceful glide
const sim = d3.forceSimulation(nodes)
  .force('target', targetForce())
  .force('collide', d3.forceCollide().radius(d => d.show ? NR + 4 : 0).strength(0.9))
  .velocityDecay(0.45).alphaDecay(0.006)
  .on('tick', () => { tickClock++; renderPositions(); });

/* ── interactivity: click a team to re-pair, click a game to break it (only on flagged scenes) ── */
nodeSel.on('click', (ev, d) => {
  if (!scenes[current].interactive) return;
  const g = groupOf(d.id);
  if (!g || !g.colored || !g.interactive) return;
  cycleTeam(g, g.members.indexOf(d.id));
  userAction = true;                                 // a new game from this tap should buzz
  refresh();
  sim.alpha(0.4).alphaTarget(0).restart();         // glide the re-paired in and the newly stranded out
});
function onLinkClick(d) {
  if (!scenes[current].interactive) return;
  const g = groups.find(g => g.interactive && g.members.includes(d.a) && g.members.includes(d.b));
  if (!g) return;
  const ia = g.members.indexOf(d.a), ib = g.members.indexOf(d.b);
  g.mask &= ~(1 << (ib === (ia + 1) % g.m ? ia : ib));     // turn that edge off
  refresh();
  sim.alpha(0.4).alphaTarget(0).restart();
}

/* ───────────────── build the scrolling narrative + wiring ───────────────── */
const main = d3.select('main'), dots = d3.select('.dots');
scenes.forEach((sc, i) => {
  const sec = main.append('section').attr('class', 'step').attr('data-i', i);
  const card = sec.append('div').attr('class', 'card');
  card.append('div').attr('class', 'kicker').text(sc.kicker);
  card.append('h2').text(sc.title);
  card.append('p').text(sc.body);
  if (sc.stat) {
    const s = card.append('div').attr('class', 'stat ' + sc.stat.tone);
    s.append('span').attr('class', 'num').text(sc.stat.n);
    s.append('span').attr('class', 'unit').text(sc.stat.text);
  }
  if (sc.interactive) card.append('div').attr('class', 'tryit').text('✦ tap the circles or a green game to re-pair');
  if (i === 0) card.append('div').attr('class', 'hint').text('scroll ↓   ·   or press ↓ / ↑');
  dots.append('button').on('click', () => go(i));
});

const sections = [...document.querySelectorAll('.step')];

// the section crossing the viewport centre is the active scene; the one it replaces fades up & out
let activeSec = null;
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting || e.target === activeSec) return;
    if (activeSec) { const old = activeSec; old.classList.remove('active'); old.classList.add('exiting');
      setTimeout(() => old.classList.remove('exiting'), 600); }
    e.target.classList.add('active'); e.target.classList.remove('exiting');
    activeSec = e.target;
    const i = +e.target.dataset.i;
    if (i !== current) applyScene(i);
  });
}, { rootMargin: '-45% 0px -45% 0px', threshold: 0 });
sections.forEach(s => io.observe(s));

function go(i) { i = clamp(i, 0, scenes.length - 1); sections[i].scrollIntoView({ behavior: 'smooth' }); }
addEventListener('keydown', e => {
  if (['ArrowDown', 'PageDown', ' '].includes(e.key)) { e.preventDefault(); go(current + 1); }
  else if (['ArrowUp', 'PageUp'].includes(e.key))     { e.preventDefault(); go(current - 1); }
  else if (e.key === 'Home') { e.preventDefault(); go(0); }
  else if (e.key === 'End')  { e.preventDefault(); go(scenes.length - 1); }
});

const progress = document.getElementById('progress');
addEventListener('scroll', () => {
  const max = document.documentElement.scrollHeight - innerHeight;
  progress.style.width = (max > 0 ? (scrollY / max) * 100 : 0) + '%';
}, { passive: true });

let rt;
addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(() => { measureCards(); optimizeSpool(); precomputeAll(); applyScene(current); }, 160); });

// start: scatter near centre, then settle into scene 0
nodes.forEach(nd => { nd.x = innerWidth/2 + (Math.random()-0.5)*200; nd.y = innerHeight/2 + (Math.random()-0.5)*200; });
measureCards();                                    // stage() reserves the tallest card's real height
optimizeSpool();
precomputeAll();                                   // kick off the worker in the background (live sim until frames arrive)
sections[0].classList.add('active'); activeSec = sections[0];
nodeSel.style('opacity', 0);                       // everything enters through its scene (arrivals spawn one by one)
applyScene(0);

/* ── device tilt → a subtle parallax sway of the whole graphic (not the chrome) ──
   Translating the <svg> shifts the circles & links against the fixed gradient behind them,
   so it reads as gentle depth. Clamped to a few px and eased, never dramatic. */
(function deviceTilt() {
  if (reduceMotion()) return;
  const svgEl = svg.node();
  const MAX = 14;                                   // px — the most the field ever drifts
  let baseG = null, baseB = null, tx = 0, ty = 0, cx = 0, cy = 0, running = false, listening = false;

  function onTilt(e) {
    const g = e.gamma, b = e.beta;
    if (g == null || b == null) return;                       // no orientation in this event
    if (baseG == null) { baseG = g; baseB = b; }              // first reading = however you're holding it
    tx = clamp((g - baseG) / 18, -1, 1) * MAX;                // roll  → left/right
    ty = clamp((b - baseB) / 18, -1, 1) * MAX;                // pitch → up/down
    if (!running) { running = true; requestAnimationFrame(loop); }
  }
  function loop() {                                  // ease toward the target so the sway is smooth
    cx += (tx - cx) * 0.09; cy += (ty - cy) * 0.09;
    svgEl.style.transform = `translate3d(${cx.toFixed(2)}px, ${cy.toFixed(2)}px, 0)`;
    requestAnimationFrame(loop);
  }
  function listen() { if (!listening) { listening = true; addEventListener('deviceorientation', onTilt, true); } }

  const DO = window.DeviceOrientationEvent, DM = window.DeviceMotionEvent;
  if (!DO) return;
  if (typeof DO.requestPermission === 'function') {           // iOS: needs a deliberate tap on a real control
    const btn = document.getElementById('tiltbtn');           // (the implicit-gesture path never prompts in a home-screen app)
    btn.style.display = 'inline-flex';
    btn.addEventListener('click', () => {
      btn.style.display = 'none';
      Promise.resolve(DO.requestPermission()).then(s => { if (s === 'granted') listen(); }).catch(() => {});
      if (DM && typeof DM.requestPermission === 'function') DM.requestPermission().catch(() => {});
    });
  } else {
    listen();                                                 // Android / desktop sensors: no permission needed
  }
})();
</script>

<script>
  /* register the service worker so the story installs and works offline */
  if ('serviceWorker' in navigator) {
    addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
</script>
</body>
