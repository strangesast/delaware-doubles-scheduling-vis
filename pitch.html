<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0b1220">
<title>27 teams, 2 people waiting — a scheduling story</title>

<!-- PWA: installable, offline-capable, full-bleed on iPhone -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Doubles">
<meta name="application-name" content="Doubles">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  :root { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
          --horizon: 45vh; }   /* where the sky meets the ground in the split scene (shared by CSS + JS) */
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
  body { margin: 0; color: #0f172a; background: #0b1220; }
  ::-webkit-scrollbar { width: 0; }

  /* fixed full-screen physics graphic, behind the scrolling text */
  #graphic { position: fixed; inset: 0; z-index: 0;
             background: radial-gradient(120% 100% at 70% 10%, #16233b 0%, #0b1220 60%); }
  #graphic svg { width: 100%; height: 100%; display: block;
                 will-change: transform; }              /* device-tilt parallax composites on this layer */
  .fx circle { pointer-events: none; }                  /* connection ripples — purely decorative */
  /* a game's clock, under the circles: the link widens into a bar (track) and a bright fill creeps along it */
  .progs line { stroke-linecap: round; pointer-events: none; }
  .progs line.track { stroke: #15803d; stroke-width: calc(14px * var(--sw)); opacity: .85; }
  .progs line.prog  { stroke: #ecfdf5; stroke-width: calc(9px * var(--sw)); }

  /* ring guides, pairing links, team circles — strokes & label sizes scale with --sw (node radius / 14) */
  #graphic svg { --sw: 1; }
  .guide { display: none; }   /* positions only — the schedule circles are never drawn */
  .divider { stroke: #33456b; stroke-width: calc(2px * var(--sw)); stroke-dasharray: 3 9; stroke-linecap: round; }
  .pair  { stroke: #34d399; stroke-width: calc(5px * var(--sw)); stroke-linecap: round; }
  .pair.want { stroke: #64748b; stroke-width: calc(1.8px * var(--sw)); stroke-dasharray: 3 9; stroke-linecap: butt; }
  .hit   { stroke: transparent; stroke-width: 18; }
  .team circle { stroke-width: calc(2.5px * var(--sw)); transition: fill .55s ease, stroke .55s ease; filter: url(#soft); }
  .team .idle, .team circle.idle { fill: #64748b; stroke: #94a3b8; }
  .team circle.play { fill: #22c55e; stroke: #86efac; }
  .team circle.wait { fill: #f97316; stroke: #fdba74; }
  .team circle.absent { fill: #273450; stroke: #44536f; }     /* cancelled: dark, label becomes ✕ */
  .team circle.isolated { fill: #7f1d1d; stroke: #f87171;     /* both scheduled opponents cancelled */
                          animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { stroke-opacity: 1; } 50% { stroke-opacity: 0.2; } }
  @keyframes shake { 0%, 100% { transform: translateX(0); }      /* brief "look here" wiggle */
    15%, 45%, 75% { transform: translateX(calc(-6px * var(--sw))); }
    30%, 60%, 90% { transform: translateX(calc( 6px * var(--sw))); } }
  .team circle      { fill: #64748b; stroke: #94a3b8; }
  .team text { fill: #fff; font-weight: 700; text-anchor: middle;
               dominant-baseline: central; pointer-events: none; }
  .team text.nname { fill: #94a3b8; font-weight: 600; font-size: calc(11px * var(--sw));
                     text-anchor: start; dominant-baseline: central; }
  .gcap { fill: #94a3b8; font-size: calc(14px * var(--sw)); font-weight: 600; text-anchor: middle; }
  .gcap.title { fill: #e2e8f0; font-size: calc(16px * var(--sw)); font-weight: 700; }
  .gcap.note  { fill: #fbbf24; font-size: calc(12.5px * var(--sw)); font-weight: 700; }
  .gcap.divlabel { fill: #cbd5e1; font-size: calc(15px * var(--sw)); font-weight: 700; letter-spacing: .05em; }
  .divbox { fill: rgba(96,165,250,0.06); stroke: #4a6da3; stroke-width: calc(2px * var(--sw)); stroke-dasharray: 5 7; }
  @media (max-width: 620px), (max-height: 560px) {   /* lighter, less chunky text on phones */
    .team text { font-weight: 600; }
    .gcap, .gcap.title, .gcap.note, .gcap.divlabel { font-weight: 600; }
  }
  .divbox-g { animation: fadein .6s ease both; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

  /* baseline life: every circle drifts on a slow, tiny loop — per-node duration & phase
     (--wob-d / --wob-t, set at creation) keep the crowd from breathing in sync */
  @media (prefers-reduced-motion: no-preference) {
    .team .wob { animation: wob var(--wob-d, 5s) ease-in-out var(--wob-t, 0s) infinite; }
  }
  @keyframes wob {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(calc( 1.3px * var(--sw)), calc(-0.9px * var(--sw))); }
    40% { transform: translate(calc(-1.1px * var(--sw)), calc(-1.3px * var(--sw))); }
    60% { transform: translate(calc(-1.4px * var(--sw)), calc( 1.0px * var(--sw))); }
    80% { transform: translate(calc( 1.0px * var(--sw)), calc( 1.2px * var(--sw))); }
  }

  /* scrolling narrative — graphic z0, cards z1 (above graphic), chrome z3+ (above cards) */
  main { position: relative; z-index: 1; pointer-events: none; }   /* clicks fall through to the graphic; .card re-enables */
  .step { height: 100vh; height: 100dvh; scroll-snap-align: center; position: relative; pointer-events: none; }
  .card {
    pointer-events: auto; z-index: 1;
    position: absolute; left: 5vw; bottom: 9vh; width: min(460px, 88vw);
    background: rgba(255,255,255,0.92); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.6); border-radius: 20px; padding: 22px 26px;
    box-shadow: 0 24px 60px -22px rgba(0,0,0,0.6);
    opacity: 0; transform: translateY(12px); will-change: opacity, transform;   /* only a slight vertical shift, mostly fade */
    transition: opacity .45s ease, transform .45s ease;
  }
  .step.active .card  { opacity: 1; transform: translateY(0); }      /* fade in, rising slightly from below */
  .step.exiting .card { opacity: 0; transform: translateY(-12px); }  /* fade out, drifting slightly up */
  .kicker { font-size: 12px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase;
            color: #2563eb; margin-bottom: 8px; }
  .card h2 { margin: 0 0 8px; font-size: 23px; line-height: 1.2; }
  .card p  { margin: 0; font-size: 15px; line-height: 1.55; color: #475569; }
  .stat { margin-top: 9px; display: flex; align-items: center; gap: 8px;
          padding-top: 9px; border-top: 1px solid #eef2f7; }
  .stat .num  { font-size: 29px; font-weight: 800; line-height: 1; white-space: nowrap; flex: none; }
  .stat .unit { font-size: 13.5px; color: #475569; line-height: 1.35; }
  .stat.bad  .num { color: #ea580c; }
  .stat.good .num { color: #16a34a; }
  .tryit { margin-top: 10px; font-size: 12.5px; font-weight: 700; color: #2563eb;
           display: inline-flex; align-items: center; gap: 6px; }
  /* the roster overlay: name chips that regroup (FLIP) across the schedule-building scenes.
     Lists run vertically, filling the stage height; the flat roster gains columns as width allows. */
  #namegrid { position: fixed; z-index: 0; display: none; pointer-events: none; gap: 34px; overflow: hidden;
              justify-content: center; align-items: center; transition: opacity .35s ease; }
  #namegrid .ncol { flex: 0 0 auto; min-width: 0; display: flex; flex-direction: column; gap: 20px; }
  #namegrid .nblock { min-width: 0; }
  #namegrid b { animation: fadein .45s ease both; }
  #namegrid .ngrid { display: flex; flex-direction: column; gap: 6px; }
  #namegrid.gapped .chip.cut { margin-top: 30px; }   /* space opens at the division boundaries first */
  /* pools: compact variant so the tallest column (4 + 7 + two headers) always fits vertically */
  #namegrid.pools { gap: 36px; }
  #namegrid.pools .ncol { gap: 10px; }
  #namegrid.pools .ngrid { gap: 4px; }
  #namegrid.pools b { font-size: 10.5px; letter-spacing: .04em; margin: 0 0 5px 2px; line-height: 1.3; }
  #namegrid.pools .chip { font-size: 12px; gap: 6px; }
  #namegrid.pools .chip i { width: 22px; height: 22px; font-size: 8.5px; }
  #namegrid b { display: block; color: #cbd5e1; font-size: 12px; font-weight: 700;
                letter-spacing: .05em; text-transform: uppercase; margin: 0 0 8px 2px; }
  /* chip = the same team-circle iconography as the ring scenes (idle colours), name aligned after */
  #namegrid .chip { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600;
                    color: #e2e8f0; width: 13.5em; will-change: transform; }
  #namegrid .chip i { font-style: normal; flex: none; width: 26px; height: 26px; border-radius: 50%;
                      background: #64748b; border: 2px solid #94a3b8; color: #fff; font-weight: 700;
                      font-size: 9.5px; display: flex; align-items: center; justify-content: center;
                      box-shadow: 0 2px 3px rgba(0,0,0,0.45); }
  #namegrid .chip span { min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  @media (max-width: 620px) {                        /* phone: shrinkable columns (scale-to-fit handles height) */
    #namegrid { gap: 12px; }
    #namegrid .ncol { flex: 1 1 0; }
    #namegrid .chip { width: auto; }
  }
  .hint { margin-top: 12px; font-size: 13px; color: #94a3b8; font-weight: 600;
          animation: bob 1.8s ease-in-out infinite; }
  @keyframes bob { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(4px); } }

  /* iOS-only opt-in to motion access (shown by script when the permission API exists) */
  #tiltbtn { position: fixed; z-index: 5; display: none; left: 50%; transform: translateX(-50%);
             top: calc(16px + env(safe-area-inset-top)); align-items: center; gap: 7px; cursor: pointer;
             background: rgba(15,23,42,0.82); border: 1px solid rgba(148,163,184,0.3); border-radius: 999px;
             color: #cbd5e1; font: 600 12.5px -apple-system, "Segoe UI", sans-serif; padding: 9px 16px;
             -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); -webkit-tap-highlight-color: transparent; }
  #tiltbtn i { font-style: normal; color: #60a5fa; font-size: 14px; }

  /* the strategy toggle (first scene): a pill slider, OLD regime vs NEW, thumb sliding between */
  #modes { position: fixed; z-index: 5; left: 50%; transform: translateX(-50%);
           top: calc(14px + env(safe-area-inset-top, 0px)); display: none; align-items: center;
           background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(148, 163, 184, 0.3);
           border-radius: 999px; padding: 4px;
           -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }
  #modes button { position: relative; z-index: 1; border: 0; background: none; color: #94a3b8;
                  cursor: pointer; font: 600 12.5px -apple-system, "Segoe UI", sans-serif;
                  padding: 7px 14px; border-radius: 999px; transition: color .25s ease;
                  -webkit-tap-highlight-color: transparent; white-space: nowrap; }
  #modes button.on { color: #f1f5f9; }
  #modethumb { position: absolute; top: 4px; bottom: 4px; border-radius: 999px;
               background: rgba(96, 165, 250, 0.28); border: 1px solid rgba(96, 165, 250, 0.45);
               transition: left .28s cubic-bezier(.2, .8, .2, 1), width .28s cubic-bezier(.2, .8, .2, 1); }

  /* the big time-lapse clock: large but muted, top-right under the tap note; vmin-sized so it fits
     every resolution and orientation. Icy gradient fill behind a thin bright outline.
     Lives INSIDE #graphic, under the grain and the svg, so circles & links always paint over it. */
  #lapse { position: absolute; right: 4vw; top: calc(64px + env(safe-area-inset-top, 0px));
           font-family: "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
           font-weight: 700; letter-spacing: .02em;    /* bold numerals — universally available faces */
           font-size: clamp(44px, 10vmin, 104px); line-height: 1.2;   /* room for descenders — at 1 the
                                                      "p" of pm pokes below the box, outside the fill */
           font-variant-numeric: tabular-nums;
           /* the fill is a sunset sky — upper sky, a tight pink band, horizon glow — whose stops
              the lapse timer re-tints as the night runs 6 → 9pm into darkness (default = dusk) */
           background: linear-gradient(180deg, rgba(44, 60, 99, 0.34) 0%, rgba(44, 60, 99, 0.34) 38%,
                                               rgba(178, 85, 135, 0.38) 60%, rgba(232, 95, 79, 0.40) 68%,
                                               rgba(232, 95, 79, 0.40) 100%);
           -webkit-background-clip: text; background-clip: text;
           color: transparent; -webkit-text-fill-color: transparent;
           -webkit-text-stroke: 0.5px rgba(226, 232, 240, 0.18);   /* hairline edge, barely there */
           pointer-events: none; display: none; }
  /* split scene only: the whole backdrop becomes an early-evening sky. A low sun sinks from high
     overhead to below the horizon while the page darkens — every value driven by the clock's own
     night fraction (see setSky), so sun, sky and clock stay locked and loop together each night.
     Lives inside #graphic behind the circles; fades in on body.sky, out otherwise. */
  #skyscene { position: absolute; inset: 0; z-index: 0; opacity: 0; pointer-events: none;
              overflow: hidden; transition: opacity .7s ease; }
  body.sky #skyscene { opacity: 1; }
  #sun { position: absolute; top: 0; left: 0; border-radius: 50%;
         will-change: transform, filter; }               /* JS sets transform/size/blur/colour each frame */
  /* the ground paints over the sun once it dips past the horizon, so it truly "sets" */
  #ground { position: absolute; left: 0; right: 0; top: var(--horizon); bottom: 0;
            box-shadow: 0 -1px 26px rgba(255, 200, 120, 0.14); }
  /* grainy gradients (css-tricks.com/grainy-gradients): an SVG fractal-noise tile, desaturated and
     forced fully opaque, then OVERLAY-blended so it lays down both light AND dark speckle — visible on
     the bright daytime sky and the dark night alike (a plain screen-blend only showed on the dark end,
     so it read as invisible). Sits behind the circles, over every scene, so the gradients read as
     textured film instead of flat cartoon fills. */
  #grain { position: absolute; inset: 0; z-index: 0; pointer-events: none;
           background: url("data:image/svg+xml,%3Csvg viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3CfeComponentTransfer%3E%3CfeFuncA type='linear' slope='0' intercept='1'/%3E%3C/feComponentTransfer%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
           background-size: 130px 130px;
           mix-blend-mode: overlay; opacity: 0.85; }
  /* the clock drops to float just above the horizon, where the sun is setting — and goes massive.
     "X:XX" is ~2em wide, so 42vw keeps it inside the width on the narrowest phones; the 30vh cap keeps
     the (line-height 1.2) box inside the space above the horizon in short landscape windows.
     min() of the two ⇒ always the largest type that still fits, in any size or orientation. */
  body.sky #lapse { top: auto; right: auto; left: 0; width: 100%; text-align: center;
                    font-size: min(42vw, 30vh);
                    bottom: calc(100vh - var(--horizon) + 8px); }

  /* chrome: title, progress, nav dots */
  .brand { position: fixed; top: 20px; left: 5vw; z-index: 3; color: #e2e8f0;
           font-size: 13px; font-weight: 700; letter-spacing: .04em; opacity: .85; pointer-events: none; }
  .brand span { color: #60a5fa; }
  #hud { position: fixed; top: 56px; right: 22px; z-index: 3; display: none; pointer-events: none;
         background: rgba(15,23,42,0.72); border: 1px solid rgba(148,163,184,0.25); border-radius: 12px;
         color: #cbd5e1; font-size: 12.5px; font-weight: 600; padding: 8px 12px; }
  #hud b { color: #fff; }
  #hud small { display: block; margin-top: 4px; color: #94a3b8; font-size: 11px; font-weight: 600; }
  #hud small i { font-style: normal; }
  #hud small i.g { color: #34d399; } #hud small i.w { color: #94a3b8; letter-spacing: 1px; }
  /* interactive scenes: a quiet pill by the graphic — circles & links respond to taps */
  #tapnote { position: fixed; top: 56px; right: 22px; z-index: 3; display: none; pointer-events: none;
             background: rgba(15,23,42,0.72); border: 1px solid rgba(148,163,184,0.25); border-radius: 12px;
             color: #cbd5e1; font-size: 12px; font-weight: 600; padding: 7px 12px; }
  #tapnote i { font-style: normal; color: #60a5fa; }
  #progress { position: fixed; top: 0; left: 0; height: 3px; width: 0;
              background: linear-gradient(90deg,#3b82f6,#22c55e); z-index: 4; transition: width .15s; }
  .dots { position: fixed; right: 22px; top: 50%; transform: translateY(-50%);
          z-index: 3; display: flex; flex-direction: column; gap: 12px; }
  .dots button { width: 11px; height: 11px; border-radius: 50%; border: 0; padding: 0; cursor: pointer;
                 background: rgba(148,163,184,0.45); transition: all .25s; }
  .dots button.on { background: #e2e8f0; transform: scale(1.45); }

  @media (max-width: 620px) {                          /* portrait phone: compact card centred at the bottom */
    .card { left: 50%; margin-left: -46vw; width: 92vw; bottom: 3vh; bottom: 3svh; padding: 13px 16px; }
    .kicker { font-size: 10px; margin-bottom: 4px; }
    .card h2 { font-size: 16px; margin-bottom: 5px; line-height: 1.15; }
    .card p  { font-size: 12.5px; line-height: 1.45; }
    .stat { margin-top: 7px; padding-top: 7px; }
    .stat .num  { font-size: 20px; }
    .stat .unit { font-size: 11px; line-height: 1.3; }
    .tryit { margin-top: 6px; font-size: 11px; }
    .hint  { margin-top: 7px; font-size: 11.5px; }
    .dots { display: none; }
    #tapnote { display: none !important; }             /* the card's ✦ hint covers it on phones */
  }
  @media (max-height: 560px) {                         /* short / landscape phone: card as a left-hand panel */
    .card { left: 2.5vw; margin-left: 0; right: auto; bottom: auto; top: 6vh; width: min(330px, 40vw);
            max-height: 88vh; overflow: auto; padding: 16px 18px; }
    .card h2 { font-size: 18px; margin-bottom: 6px; } .card p { font-size: 13.5px; line-height: 1.45; }
    .card .stat { margin-top: 10px; padding-top: 9px; } .card .stat .num { font-size: 30px; }
    .dots { display: none; }
  }

  /* ── PWA full-bleed: keep chrome clear of the Dynamic Island & home indicator ── */
  @supports (top: env(safe-area-inset-top)) {
    .brand         { top: calc(20px + env(safe-area-inset-top)); left: max(5vw, env(safe-area-inset-left)); }
    #hud, #tapnote { top: calc(56px + env(safe-area-inset-top)); right: calc(22px + env(safe-area-inset-right)); }
    .dots          { right: calc(22px + env(safe-area-inset-right)); }
    .card          { bottom: calc(9vh + env(safe-area-inset-bottom)); left: max(5vw, env(safe-area-inset-left)); }
    @media (max-width: 620px) {                        /* portrait phone keeps its centred card */
      .card        { left: 50%; bottom: calc(3svh + env(safe-area-inset-bottom)); }
    }
    @media (max-height: 560px) {                       /* landscape phone keeps its left panel */
      .card        { left: max(2.5vw, env(safe-area-inset-left)); top: calc(6vh + env(safe-area-inset-top)); bottom: auto; }
    }
  }
</style>
</head>
<body>

<div id="progress"></div>
<div class="brand">Delaware Doubles · <span>scheduling</span></div>
<div id="hud"></div>
<div id="modes">
  <span id="modethumb"></span>
  <button data-m="old" class="on">OLD</button>
  <button data-m="new">NEW</button>
</div>
<div id="tapnote"><i>✦</i> tap a circle or a game to change pairings</div>
<button id="tiltbtn"><i>↕</i> Enable tilt</button>
<div id="graphic">
  <div id="skyscene"><div id="sun"></div><div id="ground"></div></div>
  <div id="lapse"></div>
  <div id="grain"></div>
  <svg>
    <defs>
      <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.45"/>
      </filter>
    </defs>
    <g class="cam">
      <line class="divider" opacity="0"></line>
      <g class="boxes"></g>
      <g class="guides"></g>
      <g class="links"></g>
      <g class="progs"></g>
      <g class="nodes"></g>
      <g class="caps"></g>
      <g class="fx"></g>
    </g>
  </svg>
</div>
<div id="namegrid"></div>

<main></main>
<div class="dots"></div>

<script>
/* ───────────────── helpers from the ring visualization ───────────────── */
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const splitGroups = (total, target) => {            // matches ring.js / observable.md: 11,4 → [4,7] (every ring ≥ 4)
  const g = Math.max(1, Math.floor(total / target));
  return Array.from({ length: g }, (_, i) => i < g - 1 ? target : total - target * (g - 1));
};
const evenGroups = (total, divisions) => {          // 27,3 → [8,8,11]
  const D = Math.max(1, Math.min(divisions, Math.floor(total / 4)));
  let base = Math.max(4, 4 * Math.round(total / D / 4));
  while (D > 1 && total - base * (D - 1) < 4) base -= 4;
  return Array.from({ length: D }, (_, i) => i < D - 1 ? base : total - base * (D - 1));
};
// a maximum matching of a ring of m (pairs neighbours, leaves the last one out if odd)
const best = m => { const pairs = []; for (let s = 0; s + 1 < m; s += 2) pairs.push([s, s + 1]);
  return { pairs, wait: m % 2 ? [m - 1] : [] }; };
// worst stable stall for the 9-ring: games (0-1)(3-4)(6-7) strand 2,5,8 — the bad night
const matchingFor = (kind, m) =>
  (kind === 'worst' && m === 9) ? { pairs: [[0,1],[3,4],[6,7]], wait: [2,5,8] } : best(m);
const sliceMembers = (ids, sizes) => { let i = 0; return sizes.map(s => ids.slice(i, i += s)); };

// greedy free-for-all on one ring (mirrors analysis_absences.py): the present slots arrive in
// random order, each pairing on arrival with an idle present neighbour if one exists — the
// league's actual play-whoever's-free regime. Returns an animatable step list
// ({arrive:j} | {edge:k}, k = the ring-edge bit) plus the night's stranded count.
function greedyRing(m, absent) {
  const order = d3.shuffle(d3.range(m).filter(j => !absent.has(j)));
  const matched = new Set(), arrived = new Set(), steps = [];
  order.forEach(j => {
    arrived.add(j); steps.push({ arrive: j });
    const nb = [(j+m-1)%m, (j+1)%m].filter(u => !absent.has(u) && arrived.has(u) && !matched.has(u));
    if (nb.length) {
      const u = nb[Math.floor(Math.random() * nb.length)];
      matched.add(j); matched.add(u);
      steps.push({ edge: u === (j+1)%m ? j : u });
    }
  });
  return { steps, stranded: order.length - matched.size };
}

// ── ring-matching state (a bitmask per group: bit k = member k plays member k+1) ──
const onBit = (mask, k) => (mask >> k) & 1;
const popcount = x => { let c = 0; while (x) { c += x & 1; x >>= 1; } return c; };
const maskFromMatch = match => { let m = 0; match.pairs.forEach(([s]) => m |= 1 << s); return m; };
function setEdge(g, e) { const m = g.m; g.mask &= ~(1<<((e-1+m)%m)); g.mask &= ~(1<<((e+1)%m)); g.mask |= 1<<e; }
function cycleTeam(g, k) {                       // click a team: unmatched → right → left → unmatched
  const m = g.m, R = k, L = (k-1+m)%m, on = j => onBit(g.mask, j);
  const ab = g.absent || new Set();
  if (ab.has(k)) return;                         // a cancelled team can't play
  const dead = e => ab.has(e) || ab.has((e+1)%m);     // an edge needs both ends present
  const occ = j => on(j) || on((j-1+m)%m);
  if (on(R)) { if (dead(L)) g.mask &= ~(1 << R); else setEdge(g, L); }
  else if (on(L)) g.mask &= ~(1 << L);
  else {
    const cand = [R, L].filter(e => !dead(e));
    if (!cand.length) return;                    // both scheduled opponents cancelled
    const rF = !occ((k+1)%m), lF = !occ((k-1+m)%m);
    const prefer = rF || !lF ? R : L;
    setEdge(g, cand.includes(prefer) ? prefer : cand[0]);
  }
}

  { key:'split', sizes:FIX, cols:3, colored:false, live:true, ...SPLITGRID,
    kicker:'Fix · step 2', title:'Split into pools of four',
    body:'Break each division into independent pools of four — plus the one leftover pool — each kept within its division. Every team plays one of its opponents, then pairs swap so everyone plays the other; in the odd pool, whoever sits a round plays right after. The clock runs the night: teams that never wait finish by 8, the sitters by 9.',
    run: ({ at, fromScene }) => {                  // the night unfolds: round one connects game by game,
      const round = par => groups.flatMap(g => {   // par 0 → edges (0,2,…), par 1 → (1,3,…): the two interlocked pairings
        const ks = []; for (let k = par; k + 1 < g.m + par; k += 2) ks.push([g, k]); return ks;
      });
      // three beats cover every pool edge: the two interlocked rounds, then the odd pools'
      // wrap-around game — its two teams each sat out one round, so this last game is how
      // EVERYONE gets their two games; sitting simply means waiting a turn, never the night
      const rounds = [round(0), round(1), groups.flatMap(g => g.m % 2 ? [[g, g.m - 1]] : [])];
      // riding in from 8·8·11: those games ARE round one of the pool schedule (the identical id
      // pairs), so they simply stay connected through the regrouping — no break-and-rejoin
      const carried = fromScene && fromScene.key === 'rebalance';
      const regroup = splitRegroup; splitRegroup = false;
      if (regroup) {                               // OLD ⇄ NEW toggle: the circles stay on stage and
        groups.forEach(g => { g.colored = true; g.mask = 0; });   // glide to the new grouping…
        prevEdgeKeys.forEach(k => {                // …keeping only games that ARE round one of the new
          const [a, b] = k.split('-').map(Number); // schedule — anything else would clash with the
          const e = edgeBit(a, b);                 // round-one games about to connect (two links on
          if (e && e[1] % 2 === 0 && e[1] + 1 < e[0].m) e[0].mask |= 1 << e[1];   // one team)
        });
        deriveFromGroups();
      } else if (carried) {
        groups.forEach(g => { g.colored = true; g.mask = 0; });
        rounds[0].forEach(([g, k]) => g.mask |= 1 << k);
        deriveFromGroups();
      } else {
        at(900, () => step(() => groups.forEach(g => { g.colored = true; g.mask = 0; })));  // everyone shows up, unpaired
      }
      const playRound = (games, t0, preset) => {   // connect each game (unless already on), run its clock,
        const clockAt = [];                        // end it on its own time; returns when the last one ends
        // connect them left → right across the screen: order by each game's horizontal midpoint so the
        // stagger reads as a wave sweeping across the courts rather than a per-pool jumble
        const gameX = ([g, k]) => (nodes[g.members[k]].tx + nodes[g.members[(k + 1) % g.m]].tx) / 2;
        games = [...games].sort((A, B) => gameX(A) - gameX(B));
        if (preset) games.forEach((_, i) => clockAt[i] = t0);
        else games.forEach(([g, k], i) => { at(t0, () => step(() => g.mask |= 1 << k)); clockAt[i] = t0 + 250; t0 += 140; });
        let over = 0;
        games.forEach(([g, k], i) => {
          const dur = 2300 + Math.random() * 1500; // every game runs its own length — never in sync
          at(clockAt[i], () => gameClock(g.members[k], g.members[(k + 1) % g.m], dur));
          at(clockAt[i] + dur, () => step(() => {  // time! that game ends — and finishing a second
            g.mask &= ~(1 << k);                   // game leaves a team green: done for the night
            [k, (k + 1) % g.m].forEach(j => {
              g.played = g.played || {}; g.played[j] = (g.played[j] || 0) + 1;
              if (g.played[j] >= 2) (g.done = g.done || new Set()).add(j);
            });
          }));
          over = Math.max(over, clockAt[i] + dur);
        });
        return over;
      };
      // the clock's fill is the evening sky: a sunset — upper sky over a TIGHT pink/orange band
      // and the horizon glow beneath it — with every colour riding the same 6 → 9pm lapse to dark
      const ramp = cols => d3.piecewise(d3.interpolateRgb, cols);
      const skyUp   = ramp(['#9ed1f5', '#7fa8e0', '#54639f', '#222f52', '#0a1322']);  // blue → night
      const skyBand = ramp(['#ffc46b', '#fb8a5f', '#d96a8e', '#5a4a82', '#101a30']);  // the sunset band
      const skyGlow = ramp(['#ffe08a', '#ffb347', '#f0705a', '#7a4f74', '#0e1830']);  // horizon glow
      const tint = (c, o) => { const k = d3.color(c); k.opacity = o; return k.formatRgb(); };
      const dusk = f => Math.pow(f, 1.7);          // hold the light: real darkness only lands ~8:30
      const sky = f => `linear-gradient(180deg, ${tint(skyUp(dusk(f)), 0.34)} 0%, ${tint(skyUp(dusk(f)), 0.34)} 38%, `
        + `${tint(skyBand(dusk(f)), 0.38)} 60%, ${tint(skyGlow(dusk(f)), 0.40)} 68%, ${tint(skyGlow(dusk(f)), 0.40)} 100%)`;
      // the page itself becomes that same sky, only brighter and full-frame: a low sun drops from
      // high overhead to below the horizon as the night runs. setSky(n) takes the SAME 0→1 night
      // fraction the clock rides (see the timer below), so sun, sky and clock move as one and loop
      // together every night — n=0 is 6pm first serve, n=1 is closing time.
      const HORIZON = 45;                          // vh — must match --horizon in the CSS
      // muted, desaturated palettes — soft hazy daylight easing into dusk, never poster-bright
      const skyTop  = ramp(['#8fb0c6', '#8f9cb4', '#8d7e96', '#454260', '#0d1322']);  // soft day haze → mauve dusk → night
      const skyHaze = ramp(['#c7d6da', '#e6ceac', '#d39473', '#9a6878', '#121927']);  // pale haze → muted gold → clay → rose → dark
      const grndCol = ramp(['#6c7f68', '#6e7458', '#73604f', '#3b3f4c', '#0d1320']);  // sage field → dry dusk → earthy → dark
      const sunCol  = ramp(['#fdf3da', '#f6ddab', '#e7b079', '#d6855f', '#c16151']);  // warm white → soft amber → muted clay
      const skyEl = document.getElementById('skyscene'),
            sunEl = document.getElementById('sun'),
            grndEl = document.getElementById('ground');
      const setSky = n => {                         // n: 0 at first serve → 1 at closing
        const d = dusk(n);                          // hold the light then fall fast — exactly as the clock fill does
        skyEl.style.background = `linear-gradient(180deg, ${skyTop(d)} 0%, ${skyTop(d)} 30%, `
          + `${skyHaze(d)} ${HORIZON}%, ${skyHaze(d)} 100%)`;
        const gc = grndCol(d);                      // ground keeps a thin ember of the sun's colour at its lip
        grndEl.style.background = `linear-gradient(180deg, ${tint(sunCol(d), 0.5)} 0%, ${gc} 14%, ${gc} 100%)`;
        // a massive soft orb: diffuse, hazy halo when high overhead, tightening into a clear-edged
        // disc as it nears the horizon. Positioned by transform (not top/left) and lit by the gradient
        // itself — no box-shadow — so nothing repaints a giant blur each frame and the edge never flickers.
        const c = sunCol(d), sz = 36 + n * 18;       // already large; swells further toward the horizon
        const x = 50 + (n - 0.5) * 64;               // sweep west: arcing from the left across to the right (vw)
        const y = 16 + (HORIZON + 6) * Math.pow(n, 1.5);     // glide high, then curve down to set (vh)
        const core = 26 + n * 34;                    // solid-colour core %: diffuse up high → crisp & defined low
        sunEl.style.width = sunEl.style.height = sz + 'vmin';
        sunEl.style.transform = `translate(${x}vw, ${y}vh) translate(-50%, -50%)`;
        sunEl.style.background = `radial-gradient(circle, ${c} 0%, ${c} ${(core * 0.55).toFixed(1)}%, `
          + `${tint(c, 0.5)} ${core.toFixed(1)}%, ${tint(c, 0)} 80%)`;
        sunEl.style.filter = `blur(${((1 - n) * 4.5 + 0.4).toFixed(2)}vmin)`;  // hazy high in the sky → clear near the horizon
      };
      const paintClock = n => {                    // clock text + fill from a night fraction (drives the rewind/dawn)
        const m3 = stratMode === 'old' ? 570 : 540;   // closing minutes; 6:00pm = 360 is the floor
        const m = Math.round(360 + n * (m3 - 360));
        setLapse(`${Math.floor(m / 60)}:${String(m % 60).padStart(2, '0')}`);
        lapseEl.style.backgroundImage = sky((m - 360) / (m3 - 360));
      };
      // reverse the whole sunset — sun arcs back up, sky re-brightens, clock spins down to 6 — fast.
      // Used twice: the dawn that OPENS the scene (darkness → daylight) and the quick rewind that
      // resets each looped night so day and night flow into one another instead of snapping.
      const toDay = (dur, done) => {
        const seqAt = applySeq;
        const tmr = d3.timer(el => {
          if (applySeq !== seqAt) return tmr.stop();
          const r = clamp(1 - el / dur, 0, 1);     // 1 (closing / night) → 0 (6pm / full day)
          setSky(r); paintClock(r);
          if (el >= dur) { tmr.stop(); if (done) done(); }
        });
      };
      document.body.classList.add('sky'); setSky(1);   // open on darkness — matching the other scenes' night sky
      const lapse = (a, b, c) => {                 // the background clock, a time lapse of the night:
        const seqAt = applySeq;                    // 6pm first serves; then NEW — most done by 8, the two
        let shown = '';                            // sitters by 9 · OLD — the nines stretch to 8:30, their
        const [m2, m3] = stratMode === 'old'       // six sitters closer to 9:30, as it gets dark
          ? [510, 570] : [480, 540];
        const tmr = d3.timer(el => {               // dies (and hides) the moment any scene re-applies —
          if (applySeq !== seqAt) { setLapse(null); return tmr.stop(); }   // a scroll, a resize…
          const [p, q] = el <= b ? [[a, 360], [b, m2]] : [[b, m2], [c, m3]];   // ms → minutes past noon
          const f = clamp((el - p[0]) / (q[0] - p[0]), 0, 1);
          const mc = p[1] + f * (q[1] - p[1]);     // continuous minutes — smooth sun, before the clock rounds
          setSky(clamp((mc - 360) / (m3 - 360), 0, 1));   // sink the sun & darken the page, locked to the clock
          const m = Math.round(mc);
          const txt = `${Math.floor(m / 60)}:${String(m % 60).padStart(2, '0')}`;
          if (txt !== shown) {
            setLapse(shown = txt);
            // longhand only: the `background` shorthand would reset background-clip:text and
            // flood the whole box with the gradient instead of just the glyphs
            lapseEl.style.backgroundImage = sky((m - 360) / (m3 - 360));   // the sky darkens with the hour
          }
          if (el >= c) tmr.stop();                 // hold at closing time until the next night resets it
        });
      };
      const play = first => {                      // one full night: round one, the swap, the wrap game —
        if (!first) at(600, () => step(() =>       // a fresh night: everyone back to waiting
          groups.forEach(g => { g.played = {}; g.done = new Set(); })));
        const t0 = first && carried ? 1800 : 1400;
        const t1 = playRound(rounds[0], t0, first && carried);
        const t2 = playRound(rounds[1], t1 + 600);
        const t3 = rounds[2].length ? playRound(rounds[2], t2 + 600) : t2;
        lapse(t0, t2, t3);
        at(t3 + 400, () => toDay(900));            // the night holds at closing, then rewinds quickly to dawn…
        at(t3 + 1500, () => play(false));          // …then the next night plays forward from daylight
      };
      toDay(1400, () => play(true));               // dawn breaks first: darkness rises into full daylight, then night one
    } },
